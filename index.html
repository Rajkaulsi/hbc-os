<style>
:root{
  --nv:#0D1B2A;--nv2:#162436;--nv3:#1e3248;
  --or:#F05A28;--or2:#d94e20;--or3:#fff3ef;
  --cr:#f4f2ee;--bd:#d2cec8;--bd2:#e8e4de;
  --tx:#1a1a2e;--mu:#64748b;
  --gn:#16a34a;--rd:#dc2626;--am:#d97706;--bl:#2563eb;--pu:#7c3aed;
  --gn2:#dcfce7;--rd2:#fee2e2;--am2:#fef3c7;--bl2:#dbeafe;--pu2:#ede9fe;
  --de:#eef4fb;--dbd:#b8d0e8;--dlb:#1e4080
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--cr);color:var(--tx);font-size:13px;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
@media(min-width:1120px){body{min-width:1120px}}
@media(max-width:1119px){
  /* Mobile / tablet adjustments */
  body{font-size:12px;min-width:auto;width:100%;overflow-x:auto}
  .tabs{flex-wrap:wrap;gap:2px}
  .tab{flex:0 0 auto;font-size:10px;padding:6px 8px}
  .stagebar{display:none}
  .toolbar{flex-wrap:wrap;gap:4px}
  .toolbar .btn{font-size:11px;padding:6px 8px}
  table{font-size:11px}
  .card{margin-bottom:8px}
  .row{flex-wrap:wrap;gap:4px}
  /* Hide some columns on mobile */
  table th:nth-child(n+5),table td:nth-child(n+5){display:none}
  /* PWA-specific: show full width on mobile */
  #pages{padding:8px}
}
@media(max-width:600px){
  .tab{font-size:9px;padding:5px 6px}
  body{font-size:11px}
  h1,h2,h3{font-size:14px}
  .pill{font-size:10px;padding:2px 6px}
  textarea,input{font-size:14px} /* Prevent iOS zoom on focus */
  select{font-size:14px}
}
.hdr{background:var(--nv);position:sticky;top:0;z-index:200;box-shadow:0 2px 12px #0005}
.hdr-top{display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:3px solid var(--or)}
.brand{font-family:'Barlow Condensed';font-weight:900;font-size:21px;letter-spacing:1px;text-transform:uppercase;color:#fff}
.brand span{color:var(--or)}
.badge{background:#f05a2822;border:1px solid #f05a284d;border-radius:4px;padding:3px 10px;font-family:'Barlow Condensed';font-weight:700;font-size:11px;letter-spacing:.8px;color:var(--or)}
.sys-state{margin-left:auto;color:#ffffff99;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gn);display:inline-block;margin-right:6px}
.hdr-fields{display:grid;grid-template-columns:2fr 1fr 1fr 1.1fr 1fr .8fr;gap:6px;padding:7px 18px 9px}
.hf{display:flex;flex-direction:column;gap:2px}
.hl{font-family:'Barlow Condensed';font-weight:700;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:#ffffff66}
.hi,.hf select{background:#ffffff14;border:1px solid #ffffff24;border-radius:4px;color:#fff;padding:5px 8px;font-size:12px;outline:none}
.hi option{color:#111}
.tabs{background:var(--nv2);display:flex;padding:0 18px;gap:1px;overflow-x:auto;position:sticky;top:87px;z-index:180}
.tab{font-family:'Barlow Condensed';font-weight:700;font-size:12px;letter-spacing:.45px;text-transform:uppercase;color:#ffffff66;background:none;border:none;cursor:pointer;padding:10px 13px;border-bottom:3px solid transparent;white-space:nowrap}
.tab.active{color:var(--or);border-bottom-color:var(--or)}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:7px 18px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;position:sticky;top:124px;z-index:170}
.btn{font-family:'Barlow Condensed';font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase;padding:6px 12px;border-radius:4px;border:none;cursor:pointer;white-space:nowrap}
.btn-or{background:var(--or);color:#fff}
.btn-nv{background:var(--nv);color:#fff}
.btn-bl{background:var(--bl);color:#fff}
.btn-pu{background:var(--pu);color:#fff}
.btn-gn{background:var(--gn);color:#fff}
.btn-rd{background:var(--rd);color:#fff}
.btn-out{background:#fff;border:1.5px solid var(--bd);color:var(--tx)}
.btn-sm{font-size:10px;padding:4px 8px}
.pbar{flex:1;min-width:120px;height:6px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.pfill{height:100%;background:var(--or);width:0%}
.plbl{font-family:'Barlow Condensed';font-weight:700;font-size:11px;color:var(--mu)}
.content{padding:14px 18px;max-width:1550px;margin:0 auto}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.page{display:none}
.page.active{display:block}
.card{background:#fff;border:1px solid var(--bd);border-radius:7px;overflow:hidden;margin-bottom:10px}
.ch{background:var(--nv);color:#fff;font-family:'Barlow Condensed';font-weight:700;font-size:11px;letter-spacing:1.3px;text-transform:uppercase;padding:7px 10px;display:flex;align-items:center;justify-content:space-between}
.ch .sn{background:var(--or);color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;margin-right:5px}
.cb{padding:10px}
.mentor{background:#fff7ed;border-left:4px solid var(--or);padding:10px;margin-bottom:10px;line-height:1.45}
.infoBox{background:var(--de);border:1px solid var(--dbd);border-radius:6px;padding:10px;margin-bottom:10px}
.warnBox{background:var(--am2);border:1px solid #d97706;border-radius:6px;padding:10px;margin-bottom:10px}
.errBox{background:var(--rd2);border:1px solid var(--rd);border-radius:6px;padding:10px;margin-bottom:10px}
.okBox{background:var(--gn2);border:1px solid var(--gn);border-radius:6px;padding:10px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.field label{font-family:'Barlow Condensed';font-weight:700;font-size:10px;letter-spacing:.7px;text-transform:uppercase;color:var(--dlb)}
input,select,textarea{font-family:'Barlow';border:1px solid var(--dbd);border-radius:4px;padding:6px 7px;font-size:12px;background:#fff;color:var(--tx);width:100%}
textarea{min-height:58px;resize:vertical}
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff}
th{background:var(--nv);color:#fff;font-family:'Barlow Condensed';font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:7px;text-align:left}
td{border-bottom:1px solid #edf0f3;padding:6px;vertical-align:top}
tr:nth-child(even) td{background:#fafafa}
.pill{display:inline-block;border-radius:999px;padding:2px 7px;font-size:10px;font-weight:700;margin:1px 2px;background:var(--bl2);color:#1e4080}
.pill.warn{background:var(--am2);color:#92400e}
.pill.bad{background:var(--rd2);color:#991b1b}
.pill.good{background:var(--gn2);color:#166534}
.pill.info{background:var(--pu2);color:#5b21b6}
.li{display:flex;gap:7px;border-bottom:1px dashed #e5e7eb;padding:6px 0}
.ref{font-family:'Barlow Condensed';font-weight:900;color:var(--or);min-width:58px}
.mini{font-size:11px;color:var(--mu);line-height:1.35}
.stagebar{display:grid;grid-template-columns:repeat(16,1fr);gap:4px;margin-bottom:10px}
.stage{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:7px 4px;text-align:center;font-family:'Barlow Condensed';font-weight:700;font-size:10px;color:var(--mu);cursor:pointer}
.stage.active{background:var(--or);color:#fff;border-color:var(--or)}
.statusBtns{display:flex;gap:3px;flex-wrap:wrap}
.st{border:1px solid #d1d5db;background:#fff;border-radius:3px;padding:3px 6px;font-family:'Barlow Condensed';font-weight:700;font-size:10px;cursor:pointer}
.st.on.yes{background:var(--gn);color:#fff}
.st.on.no{background:var(--rd);color:#fff}
.st.on.na{background:var(--am);color:#fff}
.st.on.rfi{background:var(--bl);color:#fff}
.calcResult{background:#fff;border:1px solid var(--bd);border-radius:5px;padding:8px;margin-top:7px;line-height:1.45}
details.drawer{background:#fff;border:1px solid var(--bd);border-radius:6px;margin-top:8px}
details.drawer summary{cursor:pointer;padding:8px 10px;font-family:'Barlow Condensed';font-weight:700;color:var(--or);text-transform:uppercase}
details.drawer div{padding:8px 10px}
.linkBtn{display:inline-block;background:var(--bl);color:#fff;text-decoration:none;padding:4px 9px;border-radius:4px;font-family:'Barlow Condensed';font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin:1px}
.linkBtn:hover{background:#1d4ed8}
.linkBtn.or{background:var(--or)}
.linkBtn.gn{background:var(--gn)}
.linkBtn.nv{background:var(--nv)}
.req-prop{display:grid;grid-template-columns:1fr 1fr 1fr 80px;gap:4px;padding:5px 0;border-bottom:1px dashed #e5e7eb}
.req-prop > div{font-size:11px}
.req-prop label{font-family:'Barlow Condensed';font-weight:700;font-size:10px;color:var(--dlb);text-transform:uppercase}
.compliance-tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;font-family:'Barlow Condensed';letter-spacing:.5px;text-transform:uppercase}
.compliance-tag.pass{background:var(--gn2);color:#166534}
.compliance-tag.fail{background:var(--rd2);color:#991b1b}
.compliance-tag.over{background:var(--am2);color:#92400e}
.compliance-tag.na{background:#e5e7eb;color:#374151}
.kb-search{padding:8px 12px;font-size:14px;border:2px solid var(--or);border-radius:6px;margin-bottom:10px}
.kb-result{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:10px;margin-bottom:8px;cursor:pointer}
.kb-result:hover{border-color:var(--or);box-shadow:0 2px 8px #f05a2822}
.kb-result h4{font-family:'Barlow Condensed';color:var(--nv);text-transform:uppercase;font-size:13px;margin-bottom:4px}
.kb-result .tags{margin-top:6px}
.upload-zone{border:2px dashed var(--bd);border-radius:8px;padding:20px;text-align:center;background:#fafafa;margin-bottom:10px;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:var(--or);background:var(--or3)}
.doc-card{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:10px;margin-bottom:8px}
.doc-card .doc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.doc-card .doc-name{font-family:'Barlow Condensed';font-weight:700;font-size:13px;color:var(--nv);text-transform:uppercase}
.chat-window{background:#fff;border:1px solid var(--bd);border-radius:8px;height:400px;display:flex;flex-direction:column;margin-bottom:10px}
.chat-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.chat-msg{padding:8px 12px;border-radius:8px;max-width:80%;line-height:1.4}
.chat-msg.user{background:var(--nv);color:#fff;align-self:flex-end;border-bottom-right-radius:2px}
.chat-msg.ai{background:var(--or3);color:var(--tx);border-left:3px solid var(--or);align-self:flex-start;border-bottom-left-radius:2px}
.chat-msg.sys{background:#f3f4f6;color:var(--mu);align-self:center;font-size:11px;font-style:italic;text-align:center}
.chat-input-row{display:flex;gap:6px;padding:8px;border-top:1px solid var(--bd)}
.chat-input{flex:1;font-size:13px;padding:8px}
.section-divider{font-family:'Barlow Condensed';font-weight:900;font-size:14px;color:var(--or);text-transform:uppercase;letter-spacing:1.2px;margin:12px 0 6px;padding-bottom:4px;border-bottom:2px solid var(--or)}
.spec-row{display:flex;gap:8px;align-items:center;padding:4px 0;font-size:12px}
.spec-row .spec-label{flex:1;font-weight:600}
.spec-row .spec-val{color:var(--mu);font-family:'Barlow Condensed';font-weight:700}
.spec-row .spec-val.ok{color:var(--gn)}
.spec-row .spec-val.bad{color:var(--rd)}
@media print{
  .tabs,.toolbar,.stagebar,.btn,.linkBtn,.upload-zone,.chat-input-row{display:none!important}
  body{min-width:0;background:#fff}
  .page{display:block!important}
  .card{break-inside:avoid}
}
</style>
</head>
<body>
<header class="hdr">
<div class="hdr-top">
  <div class="brand">Homi <span>Enterprise Consultant OS</span></div>
  <div class="badge">V17 Pro</div>
  <div class="badge">VIC Building</div>
  <div class="sys-state"><span class="dot"></span><span id="engineState">System ready</span></div>
</div>
<div class="hdr-fields">
  <div class="hf"><div class="hl">Project Address</div><input class="hi" id="projectAddress" oninput="syncProject();autoTemplates()" placeholder="Street, suburb, VIC"></div>
  <div class="hf"><div class="hl">Client</div><input class="hi" id="clientName" oninput="syncProject();autoTemplates()" placeholder="Client name"></div>
  <div class="hf"><div class="hl">Building Class</div><select class="hi" id="nccClass" onchange="syncProject();runMasterEngine();autoTemplates()"></select></div>
  <div class="hf"><div class="hl">Building Work Type</div><select class="hi" id="workType" onchange="syncProject();runMasterEngine();autoTemplates()"></select></div>
  <div class="hf"><div class="hl">Council</div><input class="hi" id="council" oninput="syncProject();autoTemplates()" placeholder="Council"></div>
  <div class="hf"><div class="hl">Date</div><input class="hi" type="date" id="assessDate" oninput="syncProject();autoTemplates()"></div>
</div>
</header>
<nav class="tabs" id="tabs"></nav>
<div class="toolbar">
  <button class="btn btn-or" onclick="runMasterEngine()">⚡ Run Master Engine</button>
  <button class="btn btn-nv" onclick="saveProject()">💾 Save</button>
  <button class="btn btn-out" onclick="loadProject()">📂 Load</button>
  <button class="btn btn-out" onclick="clearProject()">🧹 Clear</button>
  <button class="btn btn-bl" onclick="runDocumentAI()">🤖 Assess Documents</button>
  <button class="btn btn-bl" onclick="generateRfis()">📬 Generate RFIs</button>
  <button class="btn btn-pu" onclick="generateReport()">📄 Final Report</button>
  <button class="btn btn-out" onclick="window.print()">🖨 Print/PDF</button>
  <div class="pbar"><div class="pfill" id="progressFill"></div></div>
  <div class="plbl" id="progressLabel">0% complete</div>
</div>
<main>
  <div class="content"><div class="stagebar" id="stagebar"></div></div>
  <div id="pages"></div>
</main>
<script>
/* ============================================================
   HBC ENTERPRISE CONSULTANT OS — V17 PRO
   Victorian Building Consultant Workflow System
   ============================================================ */

const NCC_CLASSES=["1a","1b","2","3","4","5","6","7a","7b","8","9a","9b","9c","10a","10b","10c","Mixed Use"];
const WORK_TYPES=["New structure / new building","New dwelling","Extension","Alteration","Renovation","Second dwelling / small second dwelling","Deck","Verandah","Pergola","Carport","Garage","Shed","Swimming pool","Pool barrier","Retaining wall","Fence","Demolition","Change of use","Fit-out","Commercial tenancy fit-out","Apartment development","Mixed-use development","Fire safety upgrade","Cladding rectification","Accessibility upgrade","Livable housing upgrade","Energy upgrade","Solar/battery installation","Civil/stormwater works"];

const AI_PROVIDERS=[
  {id:"google",name:"Google Gemini",models:["Gemini 1.5 Pro","Gemini 1.5 Flash","Gemini 2.0 Flash","Gemini 2.5 Pro"],best:"Plan OCR, multimodal drawing review, title block extraction"},
  {id:"claude",name:"Claude",models:["Claude Sonnet","Claude Opus","Claude Haiku"],best:"Long document reasoning, contract wording, mentoring and workflow critique"},
  {id:"chatgpt",name:"ChatGPT / OpenAI",models:["GPT-4.1","GPT-4o","GPT-5.5 Thinking","o-series reasoning"],best:"Structured assessment, RFI generation, cross-checking, report drafting"}
];

/* ============================================================
   USEFUL EXTERNAL LINKS — Victorian Authorities
   ============================================================ */
const LINKS={
  vicplan:"https://mapshare.vic.gov.au/vicplan/",
  planningSchemes:"https://planning-schemes.app.planning.vic.gov.au/",
  vbaForms:"https://www.vba.vic.gov.au/about/forms",
  vbaPracs:"https://www.vba.vic.gov.au/practitioners",

  buildingRegs:"https://www.legislation.vic.gov.au/in-force/statutory-rules/building-regulations-2018",
  ncc:"https://ncc.abcb.gov.au/",

/* ============================================================
   FORMS — with download links to current versions
   ============================================================ */
const FORMS=[
  {no:"Form 1",name:"Application for Building Permit",ref:"Building Regulations 2018",purpose:"Main application to relevant building surveyor",who:"Owner / agent / applicant",sign:"Applicant / owner agent",submit:"Relevant Building Surveyor",trigger:"Any building permit application",link:"https://www.vba.vic.gov.au/__data/assets/pdf_file/0006/40659/Application-for-a-building-permit-form.pdf",fee:"RBS-set"},
  {no:"Form 2",name:"Building Permit",ref:"Building Act / Building Regulations",purpose:"Statutory permit issued by RBS",who:"RBS prepares",sign:"Relevant Building Surveyor",submit:"Issued to applicant / council",trigger:"Permit granted",link:"https://www.vba.vic.gov.au/about/forms",fee:"Included in RBS fee"},
  {no:"Form 3",name:"Notice and Order",ref:"Building Act 1993",purpose:"Notice to comply / building order",who:"RBS / MBS",sign:"Surveyor",submit:"Owner / occupier",trigger:"Non-compliance identified",link:"https://www.vba.vic.gov.au/about/forms",fee:"N/A"},
  {no:"Form 6",name:"Protection Work Notice",ref:"Building Act 1993 Part 7",purpose:"Notify adjoining owner of proposed protection work",who:"Owner / RBS process",sign:"Owner / agent",submit:"Adjoining owner and RBS",trigger:"Protection work required",link:"https://www.vba.vic.gov.au/about/forms",fee:"$ varies"},
  {no:"Form 7",name:"Protection Work Response Notice",ref:"Building Act 1993 Part 7",purpose:"Adjoining owner response",who:"Adjoining owner",sign:"Adjoining owner",submit:"Owner / RBS",trigger:"After Form 6 served",link:"https://www.vba.vic.gov.au/about/forms",fee:"N/A"},
  {no:"Form 8",name:"Protection Work Insurance Notice",ref:"Building Act 1993 Part 7",purpose:"Evidence of required insurance",who:"Owner / builder",sign:"Insurer / owner",submit:"Adjoining owner / RBS",trigger:"Protection work accepted",link:"https://www.vba.vic.gov.au/about/forms",fee:"Insurance premium"},
  {no:"Form 10",name:"Notice of Commencement / Inspection Stage",ref:"Building Regulations 2018",purpose:"Notify commencement / mandatory inspection",who:"Builder / owner",sign:"Builder / owner",submit:"RBS",trigger:"Before commencement / stage reached",link:"https://www.vba.vic.gov.au/about/forms",fee:"N/A"},
  {no:"Form 15",name:"Application for Occupancy Permit",ref:"Building Regulations 2018",purpose:"Apply for occupancy permit",who:"Owner / applicant",sign:"Applicant",submit:"RBS",trigger:"Occupancy permit required",link:"https://www.vba.vic.gov.au/about/forms",fee:"RBS-set"},
  {no:"Form 16",name:"Occupancy Permit",ref:"Building Act / Regulations",purpose:"Occupancy approval",who:"RBS prepares",sign:"RBS",submit:"Owner / council",trigger:"Final approval",link:"https://www.vba.vic.gov.au/about/forms",fee:"Included"},

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function $(id){return document.getElementById(id)}

function init(){
  $('nccClass').innerHTML='<option value="">Select…</option>'+NCC_CLASSES.map(x=>`<option>${x}</option>`).join('');
  $('workType').innerHTML='<option value="">Select…</option>'+WORK_TYPES.map(x=>`<option>${x}</option>`).join('');
  $('tabs').innerHTML=PAGES.map((p,i)=>`<button class="tab ${i==0?'active':''}" onclick="goTab(${i})">${i+1}. ${p}</button>`).join('');
  $('stagebar').innerHTML=PAGES.map((p,i)=>`<div class="stage ${i==0?'active':''}" onclick="goTab(${i})">${i+1}<br>${p.split(' ')[0]}</div>`).join('');
  renderPages();
  autoTemplates();
}
function goTab(i){
  document.querySelectorAll('.tab').forEach((x,n)=>x.classList.toggle('active',n===i));
  document.querySelectorAll('.stage').forEach((x,n)=>x.classList.toggle('active',n===i));
  document.querySelectorAll('.page').forEach((x,n)=>x.classList.toggle('active',n===i));
  window.scrollTo(0,0);
}

}
function card(t,n,b){
  /* Allow 2-arg form: card(title, body). Detect by checking if n looks like HTML body content */
  if(b===undefined){b=n;n='';}
  return `<div class="card"><div class="ch"><span>${n?`<span class="sn">${n}</span>`:''}${t}</span></div><div class="cb">${b}</div></div>`;
}
function renderPages(){
  const r=[
    renderSettings(),       // 0
    renderClient(),          // 1
    renderPros(),            // 2
    renderDocs(),            // 3
    renderForms(),           // 4
    renderAdmin(),           // 5
    renderArchitectural(),   // 6
    renderSiting(),          // 7
    renderStructural(),      // 8
    renderFireAccess(),      // 9
    renderLivablePoolSLHC(), // 10
    renderCompliance(),      // 11
    renderAIMentor(),        // 12
    renderRFI(),             // 13
    renderReport(),          // 14
    renderKnowledge()        // 15
  ];

}

function renderOverlayAdvice(){
  const ov=(PROJECT.client.overlays||'').toUpperCase();
  const advice=[];
  const map=[
    {k:'BMO',t:'Bushfire Management Overlay',n:'Triggers planning permit. Requires BAL assessment + bushfire-defendable space + AS3959 construction. Section 173 Agreement may be conditioned.'},
    {k:'LSIO',t:'Land Subject to Inundation',n:'Floodway controls. Trigger Reg 153 / R&C if floor levels &lt; 300 mm above 1-in-100 flood level. Floor freeboard required.'},
    {k:'SBO',t:'Special Building Overlay',n:'Floodway / urban drainage. Triggers planning permit. Flow velocity &lt; 1.5 m/s. Floor levels above flood level + freeboard.'},
    {k:'HO',t:'Heritage Overlay',n:'Triggers planning permit for any external alteration, demolition or new building. Materials, form and articulation controlled.'},
    {k:'DDO',t:'Design and Development Overlay',n:'Triggers planning permit. Imposes height, setback, materiality, articulation and overshadow controls (varies by schedule).'},
    {k:'ESO',t:'Environmental Significance Overlay',n:'Triggers planning permit. Native vegetation removal restrictions. Often requires arborist + offset.'},
    {k:'VPO',t:'Vegetation Protection Overlay',n:'Triggers planning permit for tree removal/lopping. Requires arborist report.'},
    {k:'SLO',t:'Significant Landscape Overlay',n:'Triggers planning permit for buildings/works visible from streets/landscapes.'},
    {k:'EAO',t:'Environmental Audit Overlay',n:'Sensitive use (residential, child care, etc.) requires Environmental Auditor Certificate before SOC.'},
    {k:'ACZ',t:'Activity Centre Zone (zone, not overlay)',n:'Mixed use / commercial. Specific built form, height and active frontage controls.'}
  ];
  map.forEach(o=>{if(ov.includes(o.k))advice.push(o)});
  const el=$('overlayAdvice');if(!el)return;
  if(!advice.length){el.innerHTML='<div class="mini">No overlays entered yet, or none recognised. Use VicPlan to confirm overlays.</div>';return}
  el.innerHTML='<div class="warnBox"><b>Overlays detected — Planning Permit + conditions likely:</b><ul style="margin:6px 0 0 18px">'+advice.map(a=>`<li><b>${a.k}</b> — ${a.t}: ${a.n}</li>`).join('')+'</ul></div>';
}


/* ============================================================
   FEE AUTO-CALCULATION (service-based)
   ============================================================ */
function runAutoFee(){
  const c=PROJECT.client;
  const cost=+c.projectCost||0;
  const baseRates={
    "Initial Consultation":350,
    "Pre-Permit Advice":880,
    "Permit Assessment Review":1450,
    "Full Permit Assessment":2850,
    "Specialist Audit":1950,
    "Existing Building Assessment":1650,
    "Owner-Builder Defects (s137B)":1850,
    "Pool Barrier Inspection (Form 23)":295,
    "Report & Consent Application":2200,
    "Fee Proposal Only":0
  };
  let base=baseRates[c.serviceType]||0;
  /* Scale by cost if Full Assessment for larger projects */
  if(c.serviceType==='Full Permit Assessment'&&cost>500000){base+=Math.round((cost-500000)/100000)*250}
  if(c.serviceType==='Permit Assessment Review'&&cost>300000){base+=Math.round((cost-300000)/100000)*150}
  /* Add complexity for Class 2-9 */
  if(/^[2-9]/.test(c.class||'')){base=Math.round(base*1.45)}
  /* Add complexity for overlays */
  const ov=(c.overlays||'').toUpperCase();
  ['BMO','LSIO','SBO','HO','DDO'].forEach(o=>{if(ov.includes(o))base+=350});
  /* Owner-builder adds review work */
  if(c.ownerBuilder)base+=275;
  /* Urgency multiplier */
  if(c.serviceUrgency==='Priority +25%')base=Math.round(base*1.25);
  if(c.serviceUrgency==='Urgent +50%')base=Math.round(base*1.5);
  c.autoFee=base;PROJECT.fee.baseFee=base;
  const o=$('autoFeeOut');if(o)o.value=base;
  const fb=$('feeBreakdown');if(fb){
    fb.innerHTML=`<b>Auto-calculated quoted fee:</b> $${base.toLocaleString()} (ex GST)<br>
    <span class="mini">Service: <b>${esc(c.serviceType)}</b> · Class: ${c.class||'—'} · Cost: $${cost.toLocaleString()} · Overlays: ${c.overlays||'none'} · OB: ${c.ownerBuilder?'Yes':'No'} · Urgency: ${c.serviceUrgency}</span>
    <div class="mini" style="margin-top:6px">Adjust manually if needed in field above. Third-party + council + RBS fees added separately on Fee tab logic.</div>`;
  }
  updateFeeTotal();
}

function updateFeeTotal(){
  /* triggers Fee Scope tab calc if rendered */
  const total=(+PROJECT.fee.baseFee||0)+(+PROJECT.fee.thirdParty||0)+(+PROJECT.fee.councilFees||0)+(+PROJECT.fee.rbsFees||0);
  const f=$('feeTotal');if(f)f.textContent='Estimated total including third-party/council/RBS allowances: $'+total.toLocaleString();
}

/* ============================================================
   MASTER ENGINE — drives everything
   ============================================================ */
function runMasterEngine(){
  syncProject();
  const c=PROJECT.client;
  const mt={planning:[],building:[],reportConsent:[],consultants:[],authorities:[],forms:[],docs:[],assessments:[],standards:[],costs:[],allowed:[],notAllowed:[]};
  const wt=(c.workType||'').toLowerCase(),cls=(c.class||'').toLowerCase(),overlays=(c.overlays||'').toUpperCase();
  
  /* Building permit pathway */
  if(c.class||c.workType){
    mt.building.push('Building permit pathway to be confirmed against Building Act, Building Regulations and Schedule 3 exemptions');
    mt.docs.push('Architectural Drawing Set','Specifications','Title','Form 1 Application for Building Permit');
    mt.forms.push('Form 1','Form 2');
  }
  
  /* New / extension / alteration triggers */
  if(/new|extension|alteration|fit-out|apartment|commercial|mixed|change/.test(wt)){
    mt.consultants.push('Relevant Building Surveyor','Designer / Draftsperson','Structural Engineer');
    mt.docs.push('Soil / Geotechnical Report','Structural Drawings + Computations','Energy Rating / NatHERS','Survey / Re-Establishment');
  }
  
  /* Class 2-9 commercial */
  if(/^[2-9]|mixed/.test(cls)){
    mt.assessments.push('NCC Volume 1 assessment required');
    mt.consultants.push('Access Consultant','Fire Engineer / Fire Services Consultant');
    mt.docs.push('Access Report','Fire Services / ESM Schedule','Section J / JV3 Energy Report');
    mt.standards.push('AS1428.1','NCC Vol 1 Fire/Access/Energy');
    mt.notAllowed.push('Sole reliance on NCC Vol 2 — Vol 1 required for this class');
  }
  
  /* Class 1 / 10 housing */
  if(/^1[ab]?$|^10/.test(cls)){
    mt.assessments.push('NCC Volume 2 assessment required');
    mt.standards.push('AS1684','AS2870','AS4055','AS3740','AS3959 (where applicable)');
  }
  
  /* Cost-driven DBI / contract */
  if(+c.projectCost>16000&&!c.ownerBuilder){
    mt.docs.push('Domestic Building Insurance (DBI) Certificate','Domestic Building Contract');
    mt.notAllowed.push('Permit cannot issue without DBI in place (>$16k)');
  }
  if(+c.projectCost>10000){
    mt.docs.push('Major Domestic Building Contract');
  }
  
  /* Owner-builder */
  if(c.ownerBuilder&&+c.projectCost>16000){
    mt.docs.push('VBA Certificate of Consent (Owner-Builder)');
    mt.notAllowed.push('Owner-builder cannot proceed >$16k without VBA Certificate of Consent');
    mt.allowed.push('DBI exempt while OB owns the property');
  }
  
  /* Pool */
  if(/pool|spa/.test(wt)){
    mt.docs.push('Pool barrier details (AS1926.1)','Pool registration ($32, council)');
    mt.assessments.push('Pool barrier assessment + register + Form 23');
    mt.forms.push('Form 23 Certificate of Barrier Compliance');
    mt.standards.push('AS1926.1','AS1926.2');
  }
  
  /* Structural triggers */
  if(/retaining|deck|structural|slab|footing|new|extension|garage|carport/.test(wt)){
    mt.consultants.push('Structural Engineer');
    mt.standards.push('AS1684','AS2870','AS1170','AS1720','AS3700');
  }
  
  /* Overlay-driven planning permit */
  const ovTriggers={'BMO':['Bushfire Management Overlay — Planning Permit + BAL'],'LSIO':['LSIO — Planning Permit + flood freeboard'],'SBO':['SBO — Planning Permit + flood/drainage'],'HO':['Heritage Overlay — Planning Permit for any external work'],'DDO':['DDO — Planning Permit + DDO schedule controls'],'ESO':['ESO — Planning Permit (vegetation)'],'VPO':['VPO — Planning Permit (tree removal)'],'SLO':['SLO — Planning Permit (landscape visibility)']};
  Object.entries(ovTriggers).forEach(([k,v])=>{if(overlays.includes(k))v.forEach(t=>mt.planning.push(t))});
  
  if(overlays.includes('BMO')){mt.consultants.push('BAL Assessor');mt.docs.push('BAL Assessment Report');mt.standards.push('AS3959')}
  if(overlays.includes('LSIO')||overlays.includes('SBO')){mt.docs.push('Flood Level / AHD Evidence');mt.authorities.push('Council drainage / flood authority')}
  if(overlays.includes('HO')){mt.consultants.push('Heritage Consultant (recommended)');mt.docs.push('Heritage Impact Statement')}
  if(overlays.includes('ESO')||overlays.includes('VPO')){mt.consultants.push('Arborist (Level 5)');mt.docs.push('Arborist Report')}
  
  /* Trigger questions */
  PROJECT.triggers.forEach(t=>{
    if(t.status==='Yes'){
      if(t.type.includes('Report'))mt.reportConsent.push(t.question+' — '+t.ref);
      else if(t.type.includes('Planning'))mt.planning.push(t.question+' — '+t.ref);
      else if(t.type.includes('Building'))mt.building.push(t.question+' — '+t.ref);
      else if(t.type.includes('Fire'))mt.consultants.push('Fire Engineer / Fire Services');
      else if(t.type.includes('Access')||t.type.includes('Livable'))mt.consultants.push('Access Consultant');
      else if(t.type.includes('Engineer'))mt.consultants.push('Structural Engineer');
      else if(t.type.includes('Service')||t.type.includes('Authority'))mt.authorities.push(t.question);
      else if(t.type.includes('Owner'))mt.notAllowed.push('Owner-builder pathway selected — VBA cert required >$16k');
      else if(t.type.includes('Pool'))mt.standards.push('AS1926.1');
      else if(t.type.includes('SLHC'))mt.assessments.push('SLHC Type A or B envelope assessment');
      mt.costs.push(t.cost);
    }
  });
  
  /* Allowed list — common DTS pathways */
  if(!c.ownerBuilder&&+c.projectCost<=16000){mt.allowed.push('No DBI required (<$16k)')}
  if(/deck|pergola|carport|shed/.test(wt)&&+c.proposedBuildingArea<10){mt.allowed.push('Possibly Schedule 3 exempt — confirm with RBS')}
  if(/^1[ab]?$/.test(cls)&&!overlays.length){mt.allowed.push('Class 1 housing — DTS via NCC Vol 2 typical pathway')}
  
  /* dedupe */
  ['planning','building','reportConsent','consultants','authorities','docs','forms','standards','assessments','costs','allowed','notAllowed'].forEach(k=>{mt[k]=[...new Set(mt[k])]});
  
  PROJECT.masterTrigger=mt;
  $('engineState').textContent='Master Engine updated · '+(mt.planning.length+mt.building.length+mt.reportConsent.length)+' triggers active';
  /* refresh client tab fields */
  updateMasterPanel();
  renderOverlayAdvice();
  autoTemplates();
}

function updateMasterPanel(){
  const m=PROJECT.masterTrigger;
  const fmt=(arr)=>(arr&&arr.length?arr:['—']).map((x,i)=>`<div class="li"><div class="ref">${i+1}</div><div>${esc(x)}</div></div>`).join('');
  if($('meplan'))$('meplan').innerHTML=fmt(m.planning);
  if($('mebp'))$('mebp').innerHTML=fmt(m.building);
  if($('merc'))$('merc').innerHTML=fmt(m.reportConsent);
  if($('mecon'))$('mecon').innerHTML=fmt(m.consultants);

function autoFlagPros(){
  const cons=PROJECT.masterTrigger.consultants||[];
  PROJECT.professionals.forEach(p=>{
    /* keyword match */
    const role=(p.role||'').toLowerCase();
    if(cons.some(c=>{
      const cl=c.toLowerCase();
      if(role.includes('builder')&&!PROJECT.client.ownerBuilder&&cl.includes('builder'))return true;
      if(role.includes('owner builder')&&PROJECT.client.ownerBuilder)return true;
      if(role.includes('structural')&&cl.includes('structural'))return true;
      if(role.includes('civil')&&(cl.includes('civil')||cl.includes('hydraulic')))return true;
      if(role.includes('geotech')&&cl.includes('geotech'))return true;
      if(role.includes('energy')&&cl.includes('energy'))return true;
      if(role.includes('bal')&&cl.includes('bal'))return true;
      if(role.includes('arborist')&&cl.includes('arborist'))return true;
      if(role.includes('access')&&cl.includes('access'))return true;
      if(role.includes('fire')&&cl.includes('fire'))return true;
      if(role.includes('surveyor')&&(cl.includes('rbs')||cl.includes('surveyor')))return true;
      if(role.includes('draft')&&cl.includes('draft'))return true;
      if(role.includes('arch')&&cl.includes('arch'))return true;
      return false;
    }))p.required='Required';
  });
  /* Owner-builder always required if client is OB */
  if(PROJECT.client.ownerBuilder){
    const ob=PROJECT.professionals.find(p=>/owner.builder/i.test(p.role));
    if(ob)ob.required='Required';
  }
  renderPages();
}

function calcThirdParty(){
  const total=PROJECT.professionals.filter(p=>p.required==='Required').reduce((a,p)=>a+(+p.feeAllowance||0),0);
  PROJECT.fee.thirdParty=total;
  updateFeeTotal();
}

function setOverride(uid,checked){

  Object.keys(PROJECT.assessments).forEach(sec=>{

  Object.keys(PROJECT.assessments).forEach(sec=>{
    PROJECT.assessments[sec].forEach(it=>{if(it.uid===uid)it.notes=val});
  });
}

function updateProgress(){
  let total=0,done=0;
  Object.keys(PROJECT.assessments).forEach(sec=>{
    PROJECT.assessments[sec].forEach(it=>{
      total++;
      if(it.status&&it.status!=='Pending')done++;
    });
  });
  const pct=total?Math.round(done/total*100):0;
  const bar=document.getElementById('progressBar');
  if(bar)bar.style.width=pct+'%';
  const lbl=document.getElementById('progressLabel');
  if(lbl)lbl.textContent=`${done}/${total} complete (${pct}%)`;
}

function renderRequiredVsProposed(sectionName){

  if(!items.length)return '<p class="muted">No items in this section.</p>';
  let html=`<table><thead><tr>

    html+=`<tr style="${overrideStyle}">

function evalFormTrigger(f){
  const c=PROJECT.client||{};
  const trig=PROJECT.masterTrigger||{};
  const t=(f.trigger||'').toLowerCase();
  if(t.includes('always'))return true;
  if(t.includes('owner-builder')||t.includes('owner builder'))return !!c.ownerBuilder;
  if(t.includes('domestic')&&(+c.projectCost>16000))return true;
  if(t.includes('protection')&&trig.reportConsent&&trig.reportConsent.length)return true;
  if(t.includes('pool'))return /pool/i.test(c.workType||'');
  if(t.includes('siting'))return trig.reportConsent&&trig.reportConsent.length;
  if(t.includes('septic'))return /septic|onsite/i.test((c.notes||'')+(c.workType||''));
  return false;
}

function setFormStatus(idx,st){FORMS[idx].status=st;renderPages();}

function autoTriggerForms(){
  const c=PROJECT.client||{};
  FORMS.forEach(f=>{if(evalFormTrigger(f)&&f.status==='Pending')f.status='Required'});
  renderPages();
}

/* ============ TAB 7: SITING + R&C — SETBACK CALCULATOR ============ */
function renderSiting(){
  const sit=PROJECT.siting||(PROJECT.siting={});
  /* Reg 79 calc */
  const wallH=parseFloat(sit.wallHeight)||0;
  const reg79=calcReg79(wallH);
  /* Reg 80 wall on boundary */
  const boundaryLen=parseFloat(sit.boundaryLength)||0;
  const wallOnBoundary=parseFloat(sit.wallOnBoundary)||0;
  const reg80Max=10+(boundaryLen-10)*0.25;
  const reg80OK=wallOnBoundary<=reg80Max;
  /* Reg 84 overlooking */
  const winH=parseFloat(sit.windowAFFL)||0;
  const winDist=parseFloat(sit.windowDistance)||0;
  const reg84Triggers=winH>0.8 && winDist<9;
  /* Reg 86 POS */
  const posArea=parseFloat(sit.posArea)||0;
  const posDim=parseFloat(sit.posMinDim)||0;
  const reg86OK=posArea>=80 && posDim>=3;

  return card('Siting + Report &amp; Consent — Setback Calculator + Pre-filled Required Values',`
    <p class="mini muted">Required values pre-filled from Building Regulations 2018 Part 5. Use calculators below to compute Reg 79 (Side &amp; rear setbacks), Reg 80 (Wall on boundary), Reg 84 (Overlooking), Reg 86 (POS).</p>

    <h4 style="margin-top:14px">📐 Reg 79 — Side &amp; Rear Setback Calculator</h4>
    <div class="row">
      <div class="col">
        <label>Wall height (m)</label>
        <input type="number" step="0.1" value="${sit.wallHeight||''}" oninput="PROJECT.siting.wallHeight=this.value;renderPages();goTab(7)">
      </div>
      <div class="col">
        <label>Required setback (calculated)</label>
        <input value="${reg79.toFixed(2)} m" readonly style="background:#e8f5e9;font-weight:bold">
      </div>
      <div class="col">
        <label>Proposed setback (m)</label>
        <input type="number" step="0.1" value="${sit.proposedSetback||''}" oninput="PROJECT.siting.proposedSetback=this.value">
      </div>
    </div>
    <p class="mini">Formula: 1.0 m base for walls ≤ 3.6 m. +0.3 m per metre of height over 3.6 m up to 6.9 m. +1.0 m per metre over 6.9 m. Daylight to existing windows + solar access (Reg 81/82) may impose larger setback.</p>

    <h4 style="margin-top:14px">🧱 Reg 80 — Wall on Boundary</h4>
    <div class="row">
      <div class="col"><label>Boundary length (m)</label><input type="number" value="${sit.boundaryLength||''}" oninput="PROJECT.siting.boundaryLength=this.value;renderPages();goTab(7)"></div>
      <div class="col"><label>Max permitted (10m + 25% remainder)</label><input value="${reg80Max.toFixed(2)} m" readonly style="background:#e8f5e9"></div>
      <div class="col"><label>Wall on boundary length (m)</label><input type="number" value="${sit.wallOnBoundary||''}" oninput="PROJECT.siting.wallOnBoundary=this.value;renderPages();goTab(7)"></div>
      <div class="col"><label>Compliance</label><input value="${reg80OK?'✓ Compliant':'✗ Exceeds'}" readonly style="background:${reg80OK?'#e8f5e9':'#ffebee'};font-weight:bold"></div>
    </div>
    <p class="mini">Average height ≤ 3.2 m, max 3.6 m at any point. Walls fronting laneway have own rules.</p>

    <h4 style="margin-top:14px">👁 Reg 84 — Overlooking</h4>
    <div class="row">
      <div class="col"><label>Window AFFL (m)</label><input type="number" step="0.1" value="${sit.windowAFFL||''}" oninput="PROJECT.siting.windowAFFL=this.value;renderPages();goTab(7)"></div>
      <div class="col"><label>Distance to boundary (m)</label><input type="number" step="0.1" value="${sit.windowDistance||''}" oninput="PROJECT.siting.windowDistance=this.value;renderPages();goTab(7)"></div>
      <div class="col"><label>Trigger?</label><input value="${reg84Triggers?'✗ Screening required to 1.7m AFFL, ≤25% transparent':'✓ Below threshold'}" readonly style="background:${reg84Triggers?'#fff3e0':'#e8f5e9'}"></div>
    </div>
    <p class="mini">Triggered when sill &gt; 800mm AFFL AND within 9m horizontal of habitable window/POS of adjoining lot. Screen to 1700mm AFFL with ≤25% transparency, or fixed obscure glazing.</p>

    <h4 style="margin-top:14px">🌿 Reg 86 — Private Open Space</h4>
    <div class="row">
      <div class="col"><label>POS area (m²)</label><input type="number" value="${sit.posArea||''}" oninput="PROJECT.siting.posArea=this.value;renderPages();goTab(7)"></div>
      <div class="col"><label>Min dimension (m)</label><input type="number" step="0.1" value="${sit.posMinDim||''}" oninput="PROJECT.siting.posMinDim=this.value;renderPages();goTab(7)"></div>
      <div class="col"><label>Compliance</label><input value="${reg86OK?'✓ Compliant':'✗ Below 80m² / &lt; 3m dim'}" readonly style="background:${reg86OK?'#e8f5e9':'#ffebee'};font-weight:bold"></div>
    </div>
    <p class="mini">Minimum 80m² POS with one part ≥ 25m² and min 3m dimension at ground level. Upper-storey balconies: 8m² with min 1.6m dimension.</p>

    <h4 style="margin-top:18px">📋 All Siting + Report &amp; Consent Items</h4>
    ${renderRequiredVsProposed('Siting + Report & Consent')}
  `);
}

function calcReg79(h){
  if(!h||h<=0)return 1.0;
  if(h<=3.6)return 1.0;
  if(h<=6.9)return 1.0+(h-3.6)*0.3;
  return 1.0+(6.9-3.6)*0.3+(h-6.9)*1.0;
}

function quickAsk(q){
  document.getElementById('chatInput').value=q;
  sendChatMessage();
}

function sendChatMessage(){
  const inp=document.getElementById('chatInput');
  if(!inp)return;
  const txt=(inp.value||'').trim();
  if(!txt)return;
  PROJECT.chat=PROJECT.chat||[];
  PROJECT.chat.push({role:'user',text:txt,ts:Date.now()});
  inp.value='';
  /* simulate AI response */
  setTimeout(()=>{
    const resp=simulateMentorResponse(txt);
    const route=(PROJECT.settings&&PROJECT.settings.ai&&PROJECT.settings.ai.routing)||{};
    PROJECT.chat.push({role:'ai',provider:route.chat||'Claude',text:resp,ts:Date.now()});
    renderPages();goTab(12);
    setTimeout(()=>{const m=document.getElementById('chatMessages');if(m)m.scrollTop=m.scrollHeight},50);
  },300);
  renderPages();goTab(12);
}

function simulateMentorResponse(q){
  const ql=q.toLowerCase();
  const c=PROJECT.client||{};
  const trig=PROJECT.masterTrigger||{};

  if(ql.includes('rfi')||ql.includes('outstanding')){
    let rfis=[];
    Object.keys(PROJECT.assessments).forEach(sec=>{
      PROJECT.assessments[sec].forEach(it=>{
        if(it.status==='RFI'||it.status==='No')rfis.push(`• [${sec}] ${it.label} (${it.ref})`);
      });
    });
    return rfis.length?`Outstanding items requiring RFI or non-compliance flags:\n\n${rfis.join('\n')}\n\nI recommend issuing a consolidated RFI letter to the design team grouping these by discipline.`:'No outstanding RFIs at present. All assessment items are either Yes or N/A.';
  }
  if(ql.includes('form')&&(ql.includes('required')||ql.includes('missing'))){
    const need=FORMS.filter(f=>evalFormTrigger(f)).map(f=>`• ${f.no}: ${f.name} → ${f.who}`);
    return need.length?`Forms triggered by current project context:\n\n${need.join('\n')}\n\nYou can download the current versions from the Forms tab — each row has a download link to the authoritative source (VBA / VMIA / DTP).`:'No forms triggered yet — please complete the Client Enquiry tab first so I can evaluate triggers.';
  }
  if(ql.includes('reg 79')||ql.includes('setback')){
    return `Reg 79 (Side & rear setback) for your project:\n\n• Class: ${c.class||'not set'} · Work: ${c.workType||'not set'}\n• The base setback is 1.0 m for any wall up to 3.6 m in height.\n• Add 0.3 m for each metre of wall height above 3.6 m, up to 6.9 m total height.\n• Add 1.0 m for each metre above 6.9 m.\n• Daylight to existing windows (Reg 81) and solar access (Reg 82) may impose larger setbacks.\n\nUse the Siting tab calculator — it pre-fills the required value based on the wall height you enter.`;
  }
  if(ql.includes('bal')||ql.includes('bushfire')){
    return `BAL (Bushfire Attack Level) per AS3959-2018:\n\n• BAL-LOW: low risk — standard construction.\n• BAL-12.5: ember attack — non-combustible cladding, ember-proof gaps ≤ 3 mm.\n• BAL-19: increasing radiant heat — toughened glazing, screened openings.\n• BAL-29: serious risk — fire-rated walls, no exposed timber.\n• BAL-40: extreme — limited materials, FRL on external walls.\n• BAL-FZ (Flame Zone): direct flame contact — full bushfire shelter design or Performance Solution.\n\nIf the property is in BMO, a BAL Assessment must accompany the application. Defendable space landscaping is required from BAL-12.5 upward.`;
  }
  if(ql.includes('overlay')||ql.includes('planning permit')){
    const ov=c.overlays||'none';
    return `Planning permit triggers for your project:\n\n• Zone: ${c.zone||'not set'}\n• Overlays: ${ov}\n• Use VicPlan to verify (link on Client tab).\n\nCommon overlays that trigger a planning permit:\n• BMO (Bushfire Management) — BAL assessment + defendable space\n• LSIO/SBO (Flood) — finished floor levels above flood level\n• HO (Heritage) — external alterations need permit\n• DDO (Design & Development) — height/setback controls\n• ESO/VPO (Environmental/Vegetation) — tree removal permit\n• SLO (Significant Landscape) — built form controls\n\nIf any major overlay applies, the planning permit must be obtained BEFORE the building permit.`;
  }
  if(ql.includes('cover')||ql.includes('rbs')||ql.includes('letter')){
    return `Draft covering letter:\n\nDear [RBS],\n\nRe: Building Permit Application — ${c.address||'[address]'}\nLot ${c.titleLot||'[lot]'} on ${c.titlePlan||'[plan]'}\n\nWe submit the attached Form 2 application together with all required documentation listed in our Document Schedule. The proposed work is ${c.workType||'[work type]'} (Class ${c.class||'[class]'}) with an estimated cost of $${(+c.projectCost||0).toLocaleString()}.\n\nWe confirm:\n• ${(+c.projectCost>16000)?'DBI insurance has been obtained (certificate attached).':'Cost is below DBI threshold.'}\n• ${c.ownerBuilder?'The owner is an Owner-Builder; VBA Certificate of Consent attached.':'A registered Domestic Builder has been engaged.'}\n• ${trig.planning&&trig.planning.length?'Planning permit is required and attached.':'No planning permit is required.'}\n• ${trig.reportConsent&&trig.reportConsent.length?'Report and Consent applications have been lodged with Council under Building Regulations 2018 Part 5.':'No siting Reports & Consents are triggered.'}\n\nWe look forward to your review. Please contact the undersigned with any RFI.\n\nKind regards,\nHomi Building Consultants`;
  }
  if(ql.includes('override')){
    let ovs=[];
    Object.keys(PROJECT.assessments).forEach(sec=>{
      PROJECT.assessments[sec].forEach(it=>{
        if(it.override)ovs.push(`• [${sec}] ${it.label} — Required: ${it.required} | Proposed: ${it.proposed||'(none)'} | Reason: ${it.overrideReason||'(none given — REQUIRED)'}`);
      });
    });
    return ovs.length?`Override register:\n\n${ovs.join('\n\n')}\n\nNote: every override requires either a Performance Solution (with verification method per NCC A2.2), a Reg 232 dispensation, or a documented professional opinion. Items with no reason must be addressed before report finalisation.`:'No overrides currently active.';
  }
  if(ql.includes('summary')||ql.includes('snapshot')||ql.includes('status')){
    let total=0,done=0;
    Object.keys(PROJECT.assessments).forEach(s=>PROJECT.assessments[s].forEach(it=>{total++;if(it.status&&it.status!=='Pending')done++}));
    return `Project snapshot:\n\n• Client: ${c.name||'(not set)'}\n• Site: ${c.address||'(not set)'}\n• Class: ${c.class||'?'} · Work: ${c.workType||'?'} · Cost: $${(+c.projectCost||0).toLocaleString()}\n• Owner-Builder: ${c.ownerBuilder?'Yes':'No'}\n• Zone: ${c.zone||'?'} · Overlays: ${c.overlays||'none'}\n• Planning Permit: ${trig.planning&&trig.planning.length?'Required ('+trig.planning.length+' triggers)':'Not triggered'}\n• Report & Consent: ${trig.reportConsent&&trig.reportConsent.length?trig.reportConsent.length+' applications needed':'None'}\n• Assessment progress: ${done}/${total} items complete\n\nWhat would you like to drill into?`;
  }
  return `Good question. Based on your current project context (${c.name||'unnamed client'}, Class ${c.class||'?'}, ${c.workType||'no work type'}, $${(+c.projectCost||0).toLocaleString()}), I would advise checking the relevant assessment tab and using the override option where the design intentionally deviates from the deemed-to-satisfy provision. Try one of the quick prompts below for a structured response, or ask about a specific Regulation, NCC clause, or AS standard.`;
}

function generateRfis(){
  const rfis=[];
  Object.keys(PROJECT.assessments).forEach(sec=>{
    PROJECT.assessments[sec].forEach(it=>{
      if(it.status==='RFI'||it.status==='No'){
        rfis.push({group:sec,label:it.label,ref:it.ref||'',detail:`Required: ${it.required||'—'}. Proposed: ${it.proposed||'(none)'}. ${it.notes||it.overrideReason||'Please clarify or revise.'}`});
      }
    });
  });
  /* Documents */
  PROJECT.documents.forEach(d=>{
    if(d.status==='Missing'||d.status==='Expired/Stale'||d.aiOutcome==='RFI'){
      rfis.push({group:'Documents',label:d.name,ref:d.category,detail:`${d.status==='Missing'?'Document not yet received.':'Document is expired or stale — provide current version.'} ${d.aiNotes||''}`});
    }
  });
  /* Forms */
  FORMS.forEach(f=>{
    if(evalFormTrigger(f)&&(f.status==='Pending'||f.status==='Required')){
      rfis.push({group:'Forms / Notices',label:`${f.no} — ${f.name}`,ref:f.ref,detail:`Triggered: ${f.trigger}. To be completed by ${f.who}.`});
    }
  });
  /* Admin */
  (PROJECT.adminStatus||[]).forEach((s,i)=>{
    if(s==='No'||s==='RFI'){rfis.push({group:'Admin',label:`Admin item ${i+1}`,ref:'BR2018 r37',detail:PROJECT.adminNotes[i]||'Pending'});}
  });
  return rfis;
}

function buildReport(){
  const c=PROJECT.client||{};
  const trig=PROJECT.masterTrigger||{};
  const sit=PROJECT.siting||{};
  const date=new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
  const dbiNeeded=(+c.projectCost>16000);
  const reg79=calcReg79(parseFloat(sit.wallHeight)||0);

  /* Counts */
  let total=0,yes=0,no=0,rfi=0,na=0,ov=0;
  Object.keys(PROJECT.assessments).forEach(s=>{
    PROJECT.assessments[s].forEach(it=>{
      total++;
      if(it.status==='Yes')yes++;
      else if(it.status==='No')no++;
      else if(it.status==='RFI')rfi++;
      else if(it.status==='N/A')na++;
      if(it.override)ov++;
    });
  });
  const compliancePct=total?Math.round(yes/total*100):0;

  let r=`HOMI BUILDING CONSULTANTS\nBUILDING PERMIT COMPLIANCE ASSESSMENT REPORT\n${'='.repeat(60)}\n\n`;
  r+=`Report Date: ${date}\nReport Reference: HBC-${Date.now().toString(36).toUpperCase()}\n\n`;
  r+=`SITE & CLIENT PARTICULARS\n${'-'.repeat(40)}\n`;
  r+=`Owner / Applicant:    ${c.name||'[not provided]'}\n`;
  r+=`Contact:              ${c.contactPhone||''} ${c.contactEmail||''}\n`;
  r+=`Postal Address:       ${c.postalAddress||c.address||'[not provided]'}\n`;
  r+=`Subject Site:         ${c.address||'[not provided]'}\n`;
  r+=`Title Particulars:    Lot ${c.titleLot||'?'} on ${c.titlePlan||'?'}, Vol ${c.titleVol||'?'} Fol ${c.titleFol||'?'}\n`;
  r+=`Council:              ${c.council||'[not provided]'}\n`;
  r+=`Planning Zone:        ${c.zone||'[not provided]'}\n`;
  r+=`Overlays:             ${c.overlays||'None identified'}\n\n`;

  r+=`PROPOSED WORKS\n${'-'.repeat(40)}\n`;
  r+=`Building Class:       Class ${c.class||'[not provided]'}\n`;
  r+=`Type of Work:         ${c.workType||'[not provided]'}\n`;
  r+=`Estimated Cost:       $${(+c.projectCost||0).toLocaleString()}\n`;
  r+=`Floor Area:           ${c.floorArea||'[not stated]'} m²\n`;
  r+=`Owner-Builder:        ${c.ownerBuilder?'Yes — VBA Certificate '+(c.ownerBuilderCert||'(reference pending)'):'No (registered builder engaged)'}\n`;
  if(!c.ownerBuilder&&c.builderName){
    r+=`Builder:              ${c.builderName} (Lic. ${c.builderLicence||'?'})\n`;
  }
  r+=`\n`;

  r+=`1. EXECUTIVE SUMMARY\n${'-'.repeat(40)}\n`;
  r+=`This report presents a compliance assessment of the proposed ${c.workType||'building works'} at ${c.address||'the subject site'}. The works comprise a Class ${c.class||'?'} building with an estimated construction cost of $${(+c.projectCost||0).toLocaleString()}.\n\n`;
  r+=`Of ${total} assessment items reviewed across all disciplines, ${yes} have been confirmed as compliant (${compliancePct}%), ${no} are non-compliant, ${rfi} require further information, and ${na} are not applicable to this project. ${ov} item${ov===1?' carries a documented override':'s carry documented overrides'} requiring a Performance Solution or Regulation 232 dispensation.\n\n`;
  if(trig.planning&&trig.planning.length){
    r+=`A planning permit is required for this project, triggered by ${trig.planning.join('; ')}. The planning permit must be obtained prior to lodgement of the building permit application.\n\n`;
  }
  if(trig.reportConsent&&trig.reportConsent.length){
    r+=`Report and Consent applications under Building Regulations 2018 Part 5 are required for: ${trig.reportConsent.join(', ')}.\n\n`;
  }
  if(dbiNeeded&&!c.ownerBuilder){
    r+=`Domestic Building Insurance is required pursuant to the Domestic Building Contracts Act 1995, given the contract sum exceeds $16,000.\n\n`;
  }
  if(c.ownerBuilder){
    r+=`The applicant has elected to proceed as an Owner-Builder. A VBA Certificate of Consent must be lodged with the application, and the applicant should be aware that adjoining-property works are restricted within three years of the Certificate, and that a Section 137B Defects Inspection Report will be required if the property is sold within six and a half years of completion.\n\n`;
  }

  r+=`2. STATUTORY FRAMEWORK\n${'-'.repeat(40)}\n`;
  r+=`The assessment has been undertaken having regard to:\n\n`;
  r+=`• Building Act 1993 (Vic)\n• Building Regulations 2018 (Vic)\n• National Construction Code 2022 (Volumes 1 and 2 as applicable)\n• Relevant Australian Standards referenced in Schedule 4 of the Regulations\n• ${c.council||'Local'} Planning Scheme\n• Domestic Building Contracts Act 1995 (Vic)${c.ownerBuilder?'\n• VBA Owner-Builder framework':''}\n\n`;

  r+=`3. PLANNING ANALYSIS\n${'-'.repeat(40)}\n`;
  if(c.zone||c.overlays){
    r+=`The site is located within the ${c.zone||'[zone not stated]'} and is affected by the following overlays: ${c.overlays||'none identified'}.\n\n`;
  }
  if(trig.planning&&trig.planning.length){
    r+=`Planning permit triggers identified:\n`;
    trig.planning.forEach(t=>{r+=`  • ${t}\n`});
    r+=`\nThe applicant should engage a Town Planner to lodge the planning permit application via the responsible authority. Endorsed plans issued under the planning permit must be referenced when preparing the building permit application.\n\n`;
  }else{
    r+=`No planning permit triggers have been identified at this time. Should the design evolve to include works otherwise prohibited or requiring a permit under the planning scheme, this position must be revisited.\n\n`;
  }

  r+=`4. SITING AND REPORT & CONSENT\n${'-'.repeat(40)}\n`;
  if(sit.wallHeight){
    r+=`Reg 79 setback calculation: Based on the stated wall height of ${sit.wallHeight} m, the deemed-to-satisfy minimum side/rear setback is ${reg79.toFixed(2)} m. Proposed setback: ${sit.proposedSetback||'(not entered)'} m.\n\n`;
  }
  if(trig.reportConsent&&trig.reportConsent.length){
    r+=`Report and Consent applications are required under Building Regulations 2018 Part 5 for the following matters:\n`;
    trig.reportConsent.forEach(t=>{r+=`  • ${t}\n`});
    r+=`\nEach application must address the relevant matters under Reg 73-86 and is determined by the relevant Council. Issue of consent does not occur until Council has been satisfied that proposed dispensation does not unreasonably affect the amenity of adjoining properties.\n\n`;
  }else{
    r+=`No siting dispensations are currently triggered.\n\n`;
  }

  r+=`5. ASSESSMENT FINDINGS BY DISCIPLINE\n${'-'.repeat(40)}\n`;
  Object.keys(PROJECT.assessments).forEach(sec=>{
    const items=PROJECT.assessments[sec];
    const sy=items.filter(i=>i.status==='Yes').length;
    const sn=items.filter(i=>i.status==='No').length;
    const sr=items.filter(i=>i.status==='RFI').length;
    const so=items.filter(i=>i.override).length;
    r+=`\n5.${Object.keys(PROJECT.assessments).indexOf(sec)+1} ${sec}\n`;
    r+=`Compliant: ${sy}  ·  Non-compliant: ${sn}  ·  RFI: ${sr}  ·  Overrides: ${so}\n\n`;
    items.forEach(it=>{
      if(it.status==='No'||it.status==='RFI'||it.override){
        r+=`  • ${it.label} (${it.ref})\n`;
        r+=`    Required: ${it.required||'—'}\n`;
        r+=`    Proposed: ${it.proposed||'(not provided)'}\n`;
        if(it.override)r+=`    OVERRIDE — Reason: ${it.overrideReason||'(reason not provided — to be addressed)'}\n`;
        else r+=`    Status: ${it.status} — ${it.notes||'(no notes)'}\n`;
        r+=`\n`;
      }
    });
  });

  r+=`\n6. OUTSTANDING ITEMS\n${'-'.repeat(40)}\n`;
  const rfis=generateRfis();
  if(rfis.length){
    r+=`The following matters require resolution prior to permit issue:\n\n`;
    rfis.forEach((q,i)=>{r+=`${i+1}. [${q.group}] ${q.label} — ${q.detail}\n`});
    r+=`\nA consolidated Request for Information has been prepared for circulation to the design team.\n\n`;
  }else{
    r+=`No outstanding items at the time of this report.\n\n`;
  }

  r+=`7. RECOMMENDATIONS\n${'-'.repeat(40)}\n`;
  r+=`On the basis of the documentation reviewed and the assessment recorded above, Homi Building Consultants recommends:\n\n`;
  if(rfi||no){r+=`a) The outstanding items in Section 6 be addressed by the design team and re-submitted for review.\n`}
  if(ov){r+=`b) Each documented override be supported by a Performance Solution (NCC A2.2) or formal Regulation 232 dispensation, as appropriate.\n`}
  if(trig.planning&&trig.planning.length){r+=`c) The planning permit be obtained from ${c.council||'Council'} prior to lodging the building permit application.\n`}
  if(dbiNeeded&&!c.ownerBuilder){r+=`d) Domestic Building Insurance be obtained and the certificate provided prior to lodgement.\n`}
  if(c.ownerBuilder){r+=`e) The Owner-Builder Certificate of Consent be obtained from the VBA prior to lodgement.\n`}
  r+=`\nSubject to the above being satisfied, the project is ${(no===0&&rfi===0)?'considered ready for lodgement with the Relevant Building Surveyor.':'considered to require further coordination prior to lodgement.'}\n\n`;

  r+=`8. PROFESSIONAL DISCLAIMER\n${'-'.repeat(40)}\n`;
  r+=`This report has been prepared by Homi Building Consultants for the use of the named client and the relevant building surveyor in connection with the project described herein. The report relies upon documentation provided by the client and the design team as at the date of issue. Compliance positions are based on the National Construction Code 2022, Building Regulations 2018, and referenced Australian Standards in force at the date of this report. Where documentation is incomplete, RFIs have been issued; resolution of those RFIs may alter the conclusions reached. This report is not a substitute for the determination of a Relevant Building Surveyor under Section 24 of the Building Act 1993.\n\n`;

  r+=`${'='.repeat(60)}\nReport prepared by: Homi Building Consultants\nContact: [practitioner details]\nIssued: ${date}\n`;
  return r;
}

function renderKnowledge(){
  const q=PROJECT.kbQuery||'';
  const cat=PROJECT.kbCategory||'All';
  const cats=['All',...new Set(KNOWLEDGE.map(k=>k.cat))];
  const catBtns=cats.map(c=>`<button class="btn ${cat===c?'primary':''}" onclick="setKBCategory('${c}')">${c}</button>`).join(' ');

  let results=KNOWLEDGE;
  if(cat!=='All')results=results.filter(k=>k.cat===cat);
  if(q){
    const ql=q.toLowerCase();
    results=results.filter(k=>{
      return k.title.toLowerCase().includes(ql)||
             k.summary.toLowerCase().includes(ql)||
             (k.keys||[]).some(kk=>kk.toLowerCase().includes(ql))||
             k.cat.toLowerCase().includes(ql);
    });
  }

  const resultsHtml=results.length?results.map(k=>{
    const expanded=PROJECT.kbExpanded&&PROJECT.kbExpanded[k.id];
    return `<div class="kb-result">
      <div class="kb-result-head">
        <span class="pill" style="background:#0D1B2A;color:#fff">${esc(k.cat)}</span>
        <strong style="margin-left:8px">${esc(k.title)}</strong>
        <button class="btn mini" style="float:right" onclick="toggleKB('${k.id}')">${expanded?'▲ Collapse':'▼ Expand'}</button>
      </div>
      <p class="mini">${esc(k.summary)}</p>
      ${expanded?`<div class="kb-detail">
        <p><strong>Keywords:</strong> ${(k.keys||[]).map(x=>`<span class="pill">${esc(x)}</span>`).join(' ')}</p>
        ${k.link?`<p><a class="btn" href="${k.link}" target="_blank">📖 Open authoritative source</a></p>`:''}
        ${k.detail?`<div class="mini" style="background:#f6f8fa;padding:10px;border-radius:6px;margin-top:8px">${esc(k.detail).replace(/\n/g,'<br>')}</div>`:''}
      </div>`:''}
    </div>`;
  }).join(''):'<p class="muted">No results match your search.</p>';

  return card('Knowledge Base — Searchable',`
    <p class="mini muted">${KNOWLEDGE.length} entries covering Victorian building legislation, NCC, Australian Standards, siting, fire safety, owner-builder, planning overlays, livable housing, pool safety, small lot housing, and process. Search across titles, summaries, and keyword tags.</p>
    <div class="row">
      <input class="kb-search" id="kbSearchInput" placeholder="🔍 Search e.g. 'Reg 79' or 'BAL' or 'owner-builder' or 'smoke alarm'..." value="${esc(q)}" oninput="setKBQuery(this.value)">
    </div>
    <div class="row" style="margin-top:8px;flex-wrap:wrap">${catBtns}</div>
    <p class="mini muted" style="margin-top:8px">Showing <strong>${results.length}</strong> of ${KNOWLEDGE.length} entries.</p>
    <div style="margin-top:12px">${resultsHtml}</div>
  `);
}

function setKBQuery(q){
  PROJECT.kbQuery=q;
  /* in-place update only the results */
  const inp=document.activeElement;
  const pos=inp&&inp.id==='kbSearchInput'?inp.selectionStart:null;
  renderPages();goTab(15);
  if(pos!==null){
    const newInp=document.getElementById('kbSearchInput');
    if(newInp){newInp.focus();try{newInp.setSelectionRange(pos,pos)}catch(e){}}
  }
}
function setKBCategory(c){PROJECT.kbCategory=c;renderPages();goTab(15)}
function toggleKB(id){
  PROJECT.kbExpanded=PROJECT.kbExpanded||{};

  renderPages();goTab(15);
}

const STORAGE_KEY='HBC_ENTERPRISE_OS_V17';

function saveProject(){
  try{
    const blob={PROJECT,FORMS,DOCUMENTS,PROFESSIONALS,TRIGGERS};
    localStorage.setItem(STORAGE_KEY,JSON.stringify(blob));
    alert('✓ Project saved to local storage');
  }catch(e){alert('Save failed: '+e.message)}
}

function loadProject(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw){alert('No saved project found');return}
    const blob=JSON.parse(raw);
    if(blob.PROJECT)Object.assign(PROJECT,blob.PROJECT);
    if(blob.FORMS&&blob.FORMS.length===FORMS.length)blob.FORMS.forEach((f,i)=>{FORMS[i].status=f.status});
    renderPages();
    alert('✓ Project loaded');
  }catch(e){alert('Load failed: '+e.message)}
}

function clearProject(){
  if(!confirm('Clear all project data and reset? This cannot be undone.'))return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function exportProjectJSON(){
  const c=PROJECT.client||{};
  const blob={PROJECT,FORMS:FORMS.map(f=>({no:f.no,status:f.status})),timestamp:new Date().toISOString()};
  const b=new Blob([JSON.stringify(blob,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`HBC_Project_${(c.name||'untitled').replace(/\W/g,'_')}.json`;a.click();

function importProjectJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='application/json';
  inp.onchange=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=(ev)=>{try{
      const blob=JSON.parse(ev.target.result);
      if(blob.PROJECT)Object.assign(PROJECT,blob.PROJECT);
      if(blob.FORMS)blob.FORMS.forEach((ff,i)=>{if(FORMS[i])FORMS[i].status=ff.status});
      renderPages();alert('✓ Imported');
    }catch(err){alert('Import failed: '+err.message)}};
    r.readAsText(f);
  };
  inp.click();
}

function toggleSection(sec){

function sectionToggleHTML(sec){
  const on=PROJECT.sectionEnabled[sec]!==false;
  return `<div style="display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:${on?'#e8f5e9':'#fff3e0'};border-radius:20px;border:1px solid ${on?'#a5d6a7':'#ffcc80'};margin-bottom:10px">

      <input type="checkbox" ${on?'checked':''} onchange="toggleSection('${esc(sec).replace(/'/g,"\\'")}')" style="opacity:0;width:0;height:0">
      <span style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:${on?'#16a34a':'#94a3b8'};border-radius:22px;transition:.2s">
        <span style="position:absolute;height:16px;width:16px;left:${on?'23px':'3px'};bottom:3px;background:#fff;border-radius:50%;transition:.2s"></span>

/* Patch renderRequiredVsProposed to honour disabled sections */
const __origRVP=renderRequiredVsProposed;
renderRequiredVsProposed=function(sec){
  const toggle=sectionToggleHTML(sec);
  if(PROJECT.sectionEnabled[sec]===false){
    return toggle+`<div class="warnBox" style="background:#fff3e0;padding:14px;border-radius:6px;border-left:4px solid #F05A28;margin-top:8px"><strong>This section is disabled.</strong> Items will not appear in the final report, RFI list, or progress count. Enable it above to include this discipline.</div>`;
  }
  return toggle+__origRVP(sec);
};

/* Patch updateProgress to skip disabled sections */
const __origProgress=updateProgress;
updateProgress=function(){
  let total=0,done=0;
  Object.keys(PROJECT.assessments).forEach(sec=>{
    if(PROJECT.sectionEnabled[sec]===false)return;
    PROJECT.assessments[sec].forEach(it=>{
      total++;
      if(it.status&&it.status!=='Pending')done++;
    });
  });
  const pct=total?Math.round(done/total*100):0;
  const bar=document.getElementById('progressBar');if(bar)bar.style.width=pct+'%';
  const lbl=document.getElementById('progressLabel');if(lbl)lbl.textContent=`${done}/${total} complete (${pct}%)`;
};

/* Patch generateRfis to skip disabled sections */
const __origGenRfis=generateRfis;
generateRfis=function(){
  const rfis=[];
  Object.keys(PROJECT.assessments).forEach(sec=>{
    if(PROJECT.sectionEnabled[sec]===false)return;
    PROJECT.assessments[sec].forEach(it=>{
      if(it.status==='RFI'||it.status==='No'){
        rfis.push({group:sec,label:it.label,ref:it.ref||'',detail:`Required: ${it.required||'—'}. Proposed: ${it.proposed||'(none)'}. ${it.notes||it.overrideReason||'Please clarify or revise.'}`});
      }
    });
  });
  PROJECT.documents.forEach(d=>{
    if(d.status==='Missing'||d.status==='Expired/Stale'||d.aiOutcome==='RFI'){
      rfis.push({group:'Documents',label:d.name,ref:d.category,detail:`${d.status==='Missing'?'Document not yet received.':'Document is expired or stale.'} ${d.aiNotes||''}`});
    }
  });
  FORMS.forEach(f=>{
    if(evalFormTrigger(f)&&(f.status==='Pending'||f.status==='Required')){
      rfis.push({group:'Forms / Notices',label:`${f.no} — ${f.name}`,ref:f.ref,detail:`Triggered: ${f.trigger}. To be completed by ${f.who}.`});
    }
  });
  (PROJECT.adminStatus||[]).forEach((s,i)=>{
    if(s==='No'||s==='RFI'){rfis.push({group:'Admin',label:`Admin item ${i+1}`,ref:'BR2018 r37',detail:PROJECT.adminNotes[i]||'Pending'});}
  });
  return rfis;
};

/* ---------- TAB: Building Inspections (NEW) ---------- */
function renderInspections(){
  const cur=PROJECT.inspections.currentType||'PrePurchaseBP';
  const insp=INSPECTION_TYPES.find(i=>i.id===cur)||INSPECTION_TYPES[0];
  const checks=PROJECT.inspections[cur]=PROJECT.inspections[cur]||{};

  /* Inspection type tabs */
  const tabs=INSPECTION_TYPES.map(t=>{
    const shortLabel=t.name.split('(')[0].split('—')[0].trim().split(' ').slice(0,3).join(' ');
    return `<button class="btn ${cur===t.id?'primary':''}" onclick="PROJECT.inspections.currentType='${t.id}';renderPages();goTab(16)">${esc(shortLabel)}</button>`;
  }).join(' ');

  /* Header info */
  let body=`<div class="infoBox" style="background:#f6f8fa;padding:12px;border-radius:6px;margin-bottom:12px;border-left:3px solid #F05A28">
    <p style="margin:0 0 6px"><strong style="color:#0D1B2A">${esc(insp.name)}</strong></p>
    <p class="mini" style="margin:0;color:#1a1a2e">${esc(insp.scope)}</p>
  </div>`;
  body+=`<table>
    <tr><td style="width:160px;background:#f6f8fa"><strong>Category</strong></td><td>${esc(insp.cat)}</td></tr>
    <tr><td style="background:#f6f8fa"><strong>When required</strong></td><td>${esc(insp.when)}</td></tr>
    <tr><td style="background:#f6f8fa"><strong>Standard / Reference</strong></td><td>${esc(insp.standard)}</td></tr>
    <tr><td style="background:#f6f8fa"><strong>Deliverable</strong></td><td>${esc(insp.deliverable||'—')}</td></tr>
    <tr><td style="background:#f6f8fa"><strong>Typical Fee</strong></td><td>${esc(insp.typicalFee||'—')}</td></tr>
  </table>`;

  /* ---------- Helper: render a row for one item ---------- */
  function itemRow(k,label,opts){
    const st=checks[k]||{};
    const photos=st.photos||[];
    const rowBg = st.status==='Defect'||st.status==='Fail'||st.status==='No'||st.status==='CNC'?'#fee2e2'
                : st.status==='Maintenance'||st.status==='RFI'||st.status==='NC'?'#fef3c7'
                : st.status==='Compliant'||st.status==='Pass'||st.status==='Yes'||st.status==='C'?'#dcfce7'
                : st.status==='N/A'||st.status==='NA'?'#f3f4f6':'#fff';
    const statusBtns=(opts.statuses||['Pass','Fail','N/A']).map(o=>{
      const cls=st.status===o?(o==='Pass'||o==='Compliant'||o==='Yes'||o==='C'?'ok':o==='Fail'||o==='Defect'||o==='No'||o==='CNC'?'err':o==='Maintenance'||o==='RFI'||o==='NC'?'warn':''):'';
      return `<button class="btn ${cls}" style="padding:3px 7px;font-size:11px" onclick="setInspectionStatus('${cur}','${k}','${o}')">${o[0]}${o.length>1?'<span class=mini>'+o.slice(1)+'</span>':''}</button>`;
    }).join(' ');

    /* Photo thumbnails */
    let photoHtml='';
    if(photos.length){
      photoHtml=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${photos.map((p,pi)=>`
        <div style="position:relative;display:inline-block;border:1px solid #d2cec8;border-radius:4px;overflow:hidden;background:#fff">
          <img src="${p.data}" style="display:block;width:80px;height:80px;object-fit:cover;cursor:pointer" onclick="viewPhoto('${cur}','${k}',${pi})" title="${esc(p.caption||'click to enlarge')}">
          <button onclick="removePhoto('${cur}','${k}',${pi})" style="position:absolute;top:0;right:0;background:#dc2626;color:#fff;border:none;width:18px;height:18px;font-size:11px;cursor:pointer;line-height:1" title="Remove">×</button>
          ${p.caption?`<div style="font-size:9px;padding:2px 4px;background:rgba(0,0,0,.7);color:#fff;position:absolute;bottom:0;left:0;right:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.caption)}</div>`:''}
        </div>`).join('')}</div>`;
    }

    return `<tr style="background:${rowBg}">
      <td style="font-size:13px">${esc(label)}</td>
      <td style="width:140px">${statusBtns}</td>
      <td style="width:120px"><select onchange="setInspectionField('${cur}','${k}','severity',this.value)" style="font-size:11px;padding:3px;width:100%">
        <option value="">— severity —</option>
        ${['1 Negligible','2 Minor','3 Moderate','4 Major','5 Urgent / Safety'].map(o=>`<option ${st.severity===o?'selected':''}>${o}</option>`).join('')}
      </select></td>
      <td style="width:100px"><input type="number" placeholder="$ cost" value="${st.cost||''}" oninput="setInspectionField('${cur}','${k}','cost',this.value)" style="font-size:11px;width:100%"></td>
      <td><textarea rows="2" oninput="setInspectionField('${cur}','${k}','notes',this.value)" placeholder="Observation / location / rectification advice / standard reference">${esc(st.notes||'')}</textarea>
        <div style="display:flex;gap:4px;margin-top:4px;align-items:center">
          <input type="file" id="ph_${cur}_${k}" accept="image/*" multiple style="display:none" onchange="addPhotos('${cur}','${k}',event)">
          <button class="btn mini" style="padding:2px 6px;font-size:10px" onclick="document.getElementById('ph_${cur}_${k}').click()">📷 Add photo(s)</button>
          ${photos.length?`<span class="mini muted">${photos.length} photo${photos.length>1?'s':''}</span>`:''}
        </div>
        ${photoHtml}
      </td>
    </tr>`;
  }

  function itemTable(title,headerCols,rows){
    return `<h4 style="margin-top:14px;color:#0D1B2A">${title}</h4>
      <table>
        <thead><tr style="background:#0D1B2A;color:#fff">
          <th>Item</th>
          <th>Status</th>
          <th>Severity</th>
          <th>Est. cost (AUD)</th>
          <th>Observation / Photos</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  /* Stages */
  if(insp.stages){
    insp.stages.forEach((s,si)=>{
      const rows=s.chk.map((it,ii)=>itemRow(`stage_${si}_${ii}`,it,{statuses:['Pass','Fail','N/A']})).join('');
      body+=`<div style="margin-top:12px;padding:8px;background:#fff8e1;border-left:3px solid #F05A28;border-radius:4px"><strong>${esc(s.n)}</strong></div>${itemTable('',null,rows)}`;
    });
  }
  if(insp.items){
    const rows=insp.items.map((it,i)=>itemRow(`item_${i}`,it,{statuses:['Compliant','Defect','Maintenance','N/A']})).join('');
    body+=itemTable('📋 Inspection items',null,rows);
  }
  if(insp.standards14){
    const rows=insp.standards14.map((it,i)=>itemRow(`rms_${i}`,it,{statuses:['Pass','Fail','N/A']})).join('');
    body+=itemTable('🏠 14 Prescribed Rental Minimum Standards (Vic)',null,rows);
  }
  if(insp.pathway){
    body+=`<h4 style="margin-top:14px;color:#0D1B2A">🛠 Rectification pathway</h4><ol>`;
    insp.pathway.forEach(p=>{body+=`<li style="margin-bottom:4px">${esc(p)}</li>`});
    body+='</ol>';
  }
  if(insp.commonScenarios){
    body+=`<h4 style="margin-top:14px;color:#0D1B2A">📁 Common scenarios</h4><ul>`;
    insp.commonScenarios.forEach(p=>{body+=`<li>${esc(p)}</li>`});
    body+='</ul>';
  }
  if(insp.types){
    body+=`<h4 style="margin-top:14px;color:#0D1B2A">📄 Report types — select & document below</h4>`;
    const rows=insp.types.map((it,i)=>itemRow(`type_${i}`,it,{statuses:['Selected','N/A']})).join('');
    body+=itemTable('',null,rows);
  }
  if(insp.actions){
    body+=`<div class="infoBox" style="margin-top:12px;background:#dbeafe;padding:12px;border-radius:6px;border-left:4px solid #2563eb"><strong>Lodgement / Action:</strong> ${esc(insp.actions)}</div>`;
  }

  /* Summary stats for this inspection */
  let totC=0,totF=0,totM=0,totNA=0,totCost=0,totPhotos=0;
  Object.values(checks).forEach(v=>{
    if(!v)return;
    if(v.status==='Pass'||v.status==='Compliant'||v.status==='Yes'||v.status==='C')totC++;
    else if(v.status==='Fail'||v.status==='Defect'||v.status==='No'||v.status==='CNC')totF++;
    else if(v.status==='Maintenance'||v.status==='RFI'||v.status==='NC')totM++;
    else if(v.status==='N/A'||v.status==='NA')totNA++;
    if(v.cost)totCost+=parseFloat(v.cost)||0;
    if(v.photos)totPhotos+=v.photos.length;
  });

  body+=`<div style="margin-top:14px;padding:10px;background:#f6f8fa;border-radius:6px;border:1px solid #d2cec8">
    <strong>Inspection summary:</strong>
    <span class="pill ok" style="margin-left:8px">${totC} Compliant</span>
    <span class="pill err">${totF} Defects</span>
    <span class="pill warn">${totM} Maintenance</span>
    <span class="pill">${totNA} N/A</span>
    <span class="pill" style="background:#dbeafe;color:#1e40af">${totPhotos} photo${totPhotos!==1?'s':''}</span>
    ${totCost?`<span class="pill" style="background:#fff3e0;color:#92400e"><strong>Est. total rectification: $${totCost.toLocaleString()}</strong></span>`:''}
  </div>`;

  body+=`<div class="row" style="margin-top:14px">
    <button class="btn primary" onclick="exportInspectionHTML('${cur}')">📄 Export HTML report (with photos)</button>
    <button class="btn" onclick="exportInspection('${cur}')">📤 Export TXT report</button>
    <button class="btn" onclick="exportInspectionVCAT('${cur}')">⚖ VCAT format (PNVCAT2)</button>
    <button class="btn" onclick="quickAsk('Summarise the ${esc(insp.name).replace(/'/g,'')} findings and prioritise items by severity')">🤖 AI prioritisation</button>
  </div>`;

  return card('Building Inspections — Pre-Purchase · PCI · Stage · Dilapidation · Rental · Pool · Special · As-Built · ESM',`
    <p class="mini muted">Nine inspection workflows. Each item now supports status, severity rating (1-5), AUD cost estimate, observation notes with standard references, and unlimited multi-photo upload (drag-drop or click).</p>
    <div class="row" style="flex-wrap:wrap;gap:6px;padding:8px;background:#f6f8fa;border-radius:6px;margin-bottom:10px">${tabs}</div>
    ${body}
  `);
}
