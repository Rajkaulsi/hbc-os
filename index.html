  PROJECT.inspections[insp][key]=PROJECT.inspections[insp][key]||{};
  PROJECT.inspections[insp][key].status=status;
  renderPages();goTab(16);
}

function setInspectionField(insp,key,field,value){
  PROJECT.inspections[insp]=PROJECT.inspections[insp]||{};
  PROJECT.inspections[insp][key]=PROJECT.inspections[insp][key]||{};
  PROJECT.inspections[insp][key][field]=value;
}

function addPhotos(insp,key,event){
  const files=event.target.files;
  if(!files||!files.length)return;
  PROJECT.inspections[insp]=PROJECT.inspections[insp]||{};
  PROJECT.inspections[insp][key]=PROJECT.inspections[insp][key]||{};
  PROJECT.inspections[insp][key].photos=PROJECT.inspections[insp][key].photos||[];
  let pending=files.length;
  Array.from(files).forEach(f=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      /* Compress / resize large images to keep memory reasonable */
      const img=new Image();
      img.onload=()=>{
        const maxDim=1200;
        let w=img.width,h=img.height;
        if(w>maxDim||h>maxDim){
          if(w>h){h=h*maxDim/w;w=maxDim}else{w=w*maxDim/h;h=maxDim}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const data=canvas.toDataURL('image/jpeg',0.78);
        PROJECT.inspections[insp][key].photos.push({
          data:data,
          caption:'',
          ts:Date.now(),
          name:f.name
        });
        pending--;
        if(pending===0){renderPages();goTab(16)}
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(f);
  });
  event.target.value='';
}

function removePhoto(insp,key,idx){
  if(!confirm('Remove this photo?'))return;
  PROJECT.inspections[insp][key].photos.splice(idx,1);
  renderPages();goTab(16);
}

function viewPhoto(insp,key,idx){
  const p=PROJECT.inspections[insp][key].photos[idx];
  if(!p)return;
  const caption=prompt('Edit caption for this photo:',p.caption||'');
  if(caption!==null){p.caption=caption;renderPages();goTab(16)}
}

function exportInspection(id){
  const insp=INSPECTION_TYPES.find(i=>i.id===id);
  const c=PROJECT.client||{};
  const checks=PROJECT.inspections[id]||{};
  let txt=`HOMI BUILDING CONSULTANTS\n${insp.name.toUpperCase()}\n${'='.repeat(60)}\n\n`;
  txt+=`Date: ${new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'})}\n`;
  txt+=`Property: ${c.address||'[not set]'}\nClient: ${c.name||'[not set]'}\n\n`;
  txt+=`Standard / Reference: ${insp.standard}\n\nSCOPE\n${'-'.repeat(40)}\n${insp.scope}\n\n`;
  function dump(prefix,arr){
    arr.forEach((it,i)=>{
      const st=checks[`${prefix}_${i}`]||{};
      const m=st.status?`[${st.status}]`:'[ ]';
      txt+=`${m} ${it}\n`;
      if(st.severity)txt+=`   Severity: ${st.severity}\n`;
      if(st.cost)txt+=`   Estimated cost: $${parseFloat(st.cost).toLocaleString()}\n`;
      if(st.notes)txt+=`   Notes: ${st.notes}\n`;
      if(st.photos&&st.photos.length)txt+=`   Photos attached: ${st.photos.length}\n`;
      txt+='\n';
    });
  }
  if(insp.stages){
    txt+=`STAGE-BY-STAGE FINDINGS\n${'-'.repeat(40)}\n`;
    insp.stages.forEach((s,si)=>{
      txt+=`\n${s.n}\n`;
      s.chk.forEach((it,ii)=>{
        const st=checks[`stage_${si}_${ii}`]||{};
        const m=st.status?`[${st.status}]`:'[ ]';
        txt+=`  ${m} ${it}\n`;
        if(st.severity)txt+=`         Severity: ${st.severity}\n`;
        if(st.cost)txt+=`         Cost: $${parseFloat(st.cost).toLocaleString()}\n`;
        if(st.notes)txt+=`         Notes: ${st.notes}\n`;
      });
    });
  }
  if(insp.items){txt+=`\nINSPECTION ITEMS\n${'-'.repeat(40)}\n`;dump('item',insp.items)}
  if(insp.standards14){txt+=`\n14 PRESCRIBED STANDARDS\n${'-'.repeat(40)}\n`;dump('rms',insp.standards14)}
  if(insp.types){txt+=`\nREPORT TYPES\n${'-'.repeat(40)}\n`;dump('type',insp.types)}
  /* Totals */
  let totCost=0;Object.values(checks).forEach(v=>{if(v&&v.cost)totCost+=parseFloat(v.cost)||0});
  if(totCost)txt+=`\nEstimated total rectification cost: $${totCost.toLocaleString()}\n`;
  txt+=`\n${'-'.repeat(60)}\nInspector: Homi Building Consultants\n`;
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`Inspection_${id}_${(c.name||'project').replace(/\W/g,'_')}.txt`;a.click();
}

function renderAdminV18(){
  PROJECT.adminV18=PROJECT.adminV18||{};
  PROJECT.adminUI=PROJECT.adminUI||{};
  const query=(PROJECT.adminUI.query||'').toLowerCase();
  const filterMode=PROJECT.adminUI.filterMode||'All';

  /* Compute summary */
  let tot=0,yes=0,no=0,rfi=0,na=0;
  const totalItems=ADMIN_CHECKLIST.reduce((s,g)=>s+g.items.length,0);
  Object.values(PROJECT.adminV18).forEach(s=>{
    if(!s||!s.status)return;
    tot++;
    if(s.status==='Yes')yes++;else if(s.status==='No')no++;else if(s.status==='RFI')rfi++;else if(s.status==='N/A')na++;
  });
  const pct=totalItems?Math.round((yes+na)/totalItems*100):0;

  let html='';

  /* Sticky summary + controls */
  html+=`<div style="position:sticky;top:0;background:#fff;padding:10px;border-bottom:2px solid #0D1B2A;margin:-20px -20px 14px;z-index:5">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <strong style="font-family:'Barlow Condensed';font-size:18px;color:#0D1B2A;text-transform:uppercase;letter-spacing:1px">${totalItems} Items · ${ADMIN_CHECKLIST.length} Sections</strong>
      <span class="pill ok">${yes} Yes</span>
      <span class="pill err">${no} No</span>
      <span class="pill warn">${rfi} RFI</span>
      <span class="pill">${na} N/A</span>
      <span class="pill" style="background:#e5e7eb">${totalItems-tot} untouched</span>
      <div style="flex:1;min-width:200px;background:#e5e7eb;height:8px;border-radius:4px;overflow:hidden">
        <div style="width:${pct}%;background:#16a34a;height:100%;transition:width .3s"></div>
      </div>
      <span class="mini muted"><strong>${pct}% complete</strong></span>
    </div>
    <div style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <input id="admSearch" placeholder="🔍 Search items (e.g. 'Form 7', 'DBI', 'Reg 84', 'BAL', 'pool')..." value="${esc(query)}" oninput="PROJECT.adminUI.query=this.value;renderPages();goTab(5);setTimeout(()=>{const x=document.getElementById('admSearch');if(x){x.focus();x.setSelectionRange(x.value.length,x.value.length)}},10)" style="flex:1;min-width:240px;padding:6px 10px;border:1px solid #d2cec8;border-radius:4px">
      ${['All','Outstanding','Yes','No','RFI','Untouched'].map(m=>`<button class="btn ${filterMode===m?'primary':''}" onclick="PROJECT.adminUI.filterMode='${m}';renderPages();goTab(5)">${m}</button>`).join('')}
      <button class="btn" onclick="expandAllAdmin(true)">Expand All</button>
      <button class="btn" onclick="expandAllAdmin(false)">Collapse All</button>
    </div>
  </div>`;

  html+=`<p class="mini muted">Comprehensive permit application admin checklist — Building Act 1993 + Building Regulations 2018 + NCC 2022 + Council requirements + Domestic Building Contracts Act + Plumbing Regulations. Click each section header to expand. Use search to filter.</p>`;

  /* Render sections */
  ADMIN_CHECKLIST.forEach((g,gi)=>{
    /* Per-section stats */
    let sTot=g.items.length,sYes=0,sNo=0,sRfi=0,sNa=0,sUntouched=0;
    g.items.forEach((_,ii)=>{
      const st=PROJECT.adminV18[`adm_${gi}_${ii}`];
      if(!st||!st.status){sUntouched++;return}
      if(st.status==='Yes')sYes++;else if(st.status==='No')sNo++;else if(st.status==='RFI')sRfi++;else if(st.status==='N/A')sNa++;
    });

    /* Filter rows */
    const filteredItems=g.items.map((it,ii)=>({it,ii})).filter(({it,ii})=>{
      if(query && !it.toLowerCase().includes(query) && !g.sec.toLowerCase().includes(query))return false;
      const st=PROJECT.adminV18[`adm_${gi}_${ii}`];
      const status=st&&st.status;
      if(filterMode==='Outstanding')return !status||status==='No'||status==='RFI';
      if(filterMode==='Yes')return status==='Yes';
      if(filterMode==='No')return status==='No';
      if(filterMode==='RFI')return status==='RFI';
      if(filterMode==='Untouched')return !status;
      return true;
    });

    if(filteredItems.length===0 && (query||filterMode!=='All'))return; /* skip empty sections under filter */

    /* Expand state — default collapsed except first or when searching */
    const expandKey=`expand_${gi}`;
    let expanded;
    if(PROJECT.adminUI[expandKey]===undefined){
      expanded = (gi===0) || !!query || filterMode!=='All';
    }else{
      expanded = PROJECT.adminUI[expandKey];
    }
    if(query||filterMode!=='All')expanded=true; /* force expand when filtering */

    const headerBg = sNo>0?'#dc2626' : sRfi>0?'#d97706' : (sYes+sNa)===sTot?'#16a34a' : '#0D1B2A';

    html+=`<div style="margin-top:12px;border:1px solid #d2cec8;border-radius:6px;overflow:hidden">
      <div onclick="PROJECT.adminUI['${expandKey}']=${!expanded};renderPages();goTab(5)" style="cursor:pointer;background:${headerBg};color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px">
        <span style="font-size:14px">${expanded?'▼':'▶'}</span>
        <strong style="flex:1;font-family:'Barlow Condensed';font-size:16px;text-transform:uppercase;letter-spacing:1px">${esc(g.sec)}</strong>
        <span class="mini" style="background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px">${filteredItems.length}${filteredItems.length!==sTot?'/'+sTot:''} items</span>
        ${sYes?`<span class="mini" style="background:#16a34a;padding:2px 6px;border-radius:8px">✓${sYes}</span>`:''}
        ${sNo?`<span class="mini" style="background:#dc2626;padding:2px 6px;border-radius:8px">✗${sNo}</span>`:''}
        ${sRfi?`<span class="mini" style="background:#d97706;padding:2px 6px;border-radius:8px">?${sRfi}</span>`:''}
        ${sNa?`<span class="mini" style="background:#64748b;padding:2px 6px;border-radius:8px">—${sNa}</span>`:''}
        ${sUntouched?`<span class="mini" style="background:rgba(255,255,255,.15);padding:2px 6px;border-radius:8px">${sUntouched} pending</span>`:''}
      </div>`;

    if(expanded){
      html+=`<table style="margin:0;border-radius:0"><thead><tr style="background:#f6f8fa">
        <th style="width:55%">Item</th>
        <th style="width:20%">Status</th>
        <th>Notes / Evidence / Reference</th>
      </tr></thead><tbody>`;
      filteredItems.forEach(({it,ii})=>{
        const k=`adm_${gi}_${ii}`;
        const st=PROJECT.adminV18[k]||{};
        const rowBg = st.status==='No'?'#fee2e2' : st.status==='RFI'?'#fef3c7' : st.status==='Yes'?'#dcfce7' : st.status==='N/A'?'#f3f4f6' : 'transparent';
        html+=`<tr style="background:${rowBg}">
          <td style="font-size:13px">${esc(it)}</td>
          <td>${['Yes','No','N/A','RFI'].map(o=>`<button class="btn ${st.status===o?(o==='Yes'?'ok':o==='No'?'err':o==='RFI'?'warn':''):''}" style="padding:2px 8px;font-size:11px" onclick="setAdminV18Status('${k}','${o}')">${o}</button>`).join(' ')}</td>
          <td><textarea rows="2" style="font-size:12px" oninput="PROJECT.adminV18['${k}']=PROJECT.adminV18['${k}']||{};PROJECT.adminV18['${k}'].notes=this.value" placeholder="Reference number, date received, who signed, follow-up...">${esc(st.notes||'')}</textarea></td>
        </tr>`;
      });
      html+='</tbody></table>';
    }
    html+='</div>';
  });

  /* Export buttons */
  html+=`<div class="row" style="margin-top:14px">
    <button class="btn primary" onclick="exportAdminChecklist()">📤 Export checklist as report (TXT)</button>
    <button class="btn" onclick="exportAdminOutstanding()">⚠ Export outstanding items only</button>

function exportAdminChecklist(){
  const c=PROJECT.client||{};
  let t=`HOMI BUILDING CONSULTANTS\nPERMIT APPLICATION ADMIN CHECKLIST\n${'='.repeat(60)}\n\n`;
  t+=`Date: ${new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'})}\n`;
  t+=`Project: ${c.name||'[not set]'} — ${c.address||'[not set]'}\nClass ${c.class||'?'} · ${c.workType||'?'}\n\n`;
  ADMIN_CHECKLIST.forEach((g,gi)=>{
    t+=`\n${g.sec.toUpperCase()}\n${'-'.repeat(g.sec.length)}\n`;
    g.items.forEach((it,ii)=>{
      const st=(PROJECT.adminV18||{})[`adm_${gi}_${ii}`]||{};
      const mark=st.status==='Yes'?'[✓]':st.status==='No'?'[✗]':st.status==='RFI'?'[?]':st.status==='N/A'?'[—]':'[ ]';
      t+=`  ${mark} ${it}\n`;
      if(st.notes)t+=`         Notes: ${st.notes}\n`;
    });
  });
  t+=`\n${'='.repeat(60)}\nPrepared by: Homi Building Consultants\n`;
  const blob=new Blob([t],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`Admin_Checklist_${(c.name||'project').replace(/\W/g,'_')}.txt`;a.click();

function exportAdminOutstanding(){
  const c=PROJECT.client||{};
  let out=[];
  ADMIN_CHECKLIST.forEach((g,gi)=>{
    const items=g.items.map((it,ii)=>{
      const st=(PROJECT.adminV18||{})[`adm_${gi}_${ii}`]||{};
      if(!st.status||st.status==='No'||st.status==='RFI')return{it,st};
      return null;
    }).filter(Boolean);
    if(items.length)out.push({sec:g.sec,items});
  });
  let t=`OUTSTANDING ADMIN ITEMS — Action required\n${'='.repeat(60)}\n\nDate: ${new Date().toLocaleDateString()}\nProject: ${c.name||''} — ${c.address||''}\n\n`;
  out.forEach(g=>{
    t+=`\n${g.sec.toUpperCase()}\n${'-'.repeat(g.sec.length)}\n`;
    g.items.forEach(({it,st})=>{
      const m=st.status==='No'?'[NON-COMPLIANT]':st.status==='RFI'?'[RFI]':'[PENDING]';
      t+=`  ${m} ${it}\n`;
      if(st.notes)t+=`         ${st.notes}\n`;
    });
  });
  if(!out.length)t+='No outstanding items — checklist complete.\n';
  const blob=new Blob([t],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`Outstanding_${(c.name||'project').replace(/\W/g,'_')}.txt`;a.click();
}

/* Helper: open a defect picker that adds the selected defect to current inspection item */
function openDefectPicker(insp,key){
  PROJECT._defectPicker={insp,key,open:true,filter:''};
  renderPages();goTab(16);
  /* Show modal-like overlay */
  setTimeout(()=>{
    const overlay=document.createElement('div');
    overlay.id='defectPickerOverlay';
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center';
    overlay.innerHTML=`<div style="background:#fff;border-radius:8px;max-width:800px;width:95%;max-height:80vh;overflow:auto;padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #F05A28;padding-bottom:8px;margin-bottom:10px">
        <h3 style="margin:0;color:#0D1B2A">Defect Library — quick pick</h3>
        <button onclick="document.getElementById('defectPickerOverlay').remove()" style="background:#dc2626;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer">Close ✕</button>
      </div>
      <input id="dfFilter" placeholder="🔍 Search defects..." oninput="renderDefectList()" style="width:100%;padding:8px;font-size:13px;border:1px solid #d2cec8;border-radius:4px;margin-bottom:10px">
      <div id="defectList"></div>
    </div>`;
    document.body.appendChild(overlay);
    window.renderDefectList=function(){
      const filter=(document.getElementById('dfFilter').value||'').toLowerCase();
      let h='';
      DEFECT_LIBRARY.forEach(cat=>{
        const matching=cat.issues.filter(i=>!filter||i.desc.toLowerCase().includes(filter)||i.ref.toLowerCase().includes(filter)||cat.cat.toLowerCase().includes(filter));
        if(!matching.length)return;
        h+=`<h4 style="margin:14px 0 6px;color:#0D1B2A;border-bottom:1px solid #F05A28;padding-bottom:3px">${cat.cat}</h4>`;
        matching.forEach((it,ii)=>{
          h+=`<div style="padding:8px;background:#f6f8fa;margin-bottom:4px;border-left:3px solid #F05A28;border-radius:4px;cursor:pointer" onclick="applyDefect('${cat.cat.replace(/'/g,'')}',${cat.issues.indexOf(it)})">
            <strong>${esc(it.desc)}</strong><br>
            <span class="mini muted">${esc(it.ref)} · Severity: ${esc(it.sev)}</span>
          </div>`;
        });
      });
      document.getElementById('defectList').innerHTML=h||'<p class="muted">No defects match.</p>';
    };
    window.applyDefect=function(catName,issueIdx){
      const cat=DEFECT_LIBRARY.find(c=>c.cat.replace(/'/g,'')===catName);
      const issue=cat.issues[issueIdx];
      const dp=PROJECT._defectPicker;
      PROJECT.inspections[dp.insp]=PROJECT.inspections[dp.insp]||{};
      PROJECT.inspections[dp.insp][dp.key]=PROJECT.inspections[dp.insp][dp.key]||{};
      const item=PROJECT.inspections[dp.insp][dp.key];
      item.status='Defect';
      item.severity=issue.sev;
      const existing=item.notes||'';
      item.notes=(existing?existing+'\n\n':'')+`${issue.desc}\n[Ref: ${issue.ref}]`;
      document.getElementById('defectPickerOverlay').remove();
      renderPages();goTab(16);
    };
    renderDefectList();
  },10);
}

/* ---------- Cladding Rectification Levy calculator ---------- */
function renderCladdingLevy(){
  const cost=parseFloat((PROJECT.client||{}).projectCost)||0;
  /* Cladding Rectification Levy applies to certain non-domestic permits at varying rates; the actual rate schedule comes from VBA. We compute the BPLL component + indicative Cladding Levy. */
  const bpl=cost>10000?Math.round(cost*0.00128):0; /* Building Permit Levy 0.128% */
  const crl=cost>1000000?Math.round(cost*0.0008):0; /* Indicative Cladding Rectification Levy 0.08% above $1M (commercial) */
  return card('Building Permit & Cladding Rectification Levies','LEVY',`
    <p class="mini muted">Statutory levies under the Building Act 1993. Building Permit Levy (BPL) is split between the BPC and ABCB. The Cladding Rectification Levy applies to commercial building permits above the prescribed threshold to fund the Victorian Cladding Safety Program.</p>
    <table>
      <tr><td>Project cost</td><td>$${cost.toLocaleString()}</td></tr>
      <tr><td>Building Permit Levy (0.128%)</td><td>${bpl?'$'+bpl.toLocaleString():'Not triggered (≤$10,000)'}</td></tr>
      <tr><td>Cladding Rectification Levy (indicative)</td><td>${crl?'$'+crl.toLocaleString()+' (commercial threshold applies — confirm with BPC)':'Not applicable for this project value / class'}</td></tr>
      <tr><td><strong>Total indicative levy</strong></td><td><strong>$${(bpl+crl).toLocaleString()}</strong></td></tr>
    </table>
    <p class="mini muted" style="margin-top:8px">Confirm current rates and applicability with the Building and Plumbing Commission (BPC). The CRL applies to specified non-domestic permits per the Cladding Safety Victoria framework.</p>
    <a class="btn" href="https://www.vba.vic.gov.au/building/levies-fees" target="_blank">BPC Levies & Fees</a>
  `);
}

window.openDefectPicker=function(insp,key){
  PROJECT._defectPicker={insp,key};

    const existing=document.getElementById('defectPickerOverlay');if(existing)existing.remove();
    const overlay=document.createElement('div');
    overlay.id='defectPickerOverlay';
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    overlay.innerHTML=`<div style="background:#fff;border-radius:8px;max-width:1000px;width:100%;max-height:85vh;overflow:auto;padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #F05A28;padding-bottom:10px;margin-bottom:14px">
        <div>
          <h3 style="margin:0;color:#0D1B2A;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:1px">🔍 Defect Library — 561 entries</h3>
          <span class="mini muted">Categories: 33 · Search to filter · Click any defect to apply</span>
        </div>
        <button onclick="document.getElementById('defectPickerOverlay').remove()" style="background:#dc2626;color:#fff;border:none;padding:8px 14px;border-radius:4px;cursor:pointer;font-weight:bold">✕ Close</button>
      </div>
      <input id="dfFilter" placeholder="🔍 Search 561 defects — try 'crack', 'BAL', 'shower', 'AS 3740', 'pool gate', 'severity 5'..." oninput="renderDefectList()" style="width:100%;padding:10px;font-size:14px;border:2px solid #d2cec8;border-radius:4px;margin-bottom:10px">
      <div class="row" style="gap:4px;margin-bottom:10px;flex-wrap:wrap">
        <span class="mini muted" style="align-self:center">Severity filter:</span>
        <button class="btn mini" onclick="filterSev('')">All</button>
        <button class="btn mini" onclick="filterSev('5')" style="background:#dc2626;color:#fff">5 Urgent</button>
        <button class="btn mini" onclick="filterSev('4')" style="background:#ea580c;color:#fff">4 Major</button>
        <button class="btn mini" onclick="filterSev('3')" style="background:#d97706;color:#fff">3 Moderate</button>
        <button class="btn mini" onclick="filterSev('2')" style="background:#65a30d;color:#fff">2 Minor</button>
        <button class="btn mini" onclick="filterSev('1')" style="background:#6b7280;color:#fff">1 Negligible</button>
      </div>
      <div id="defectList" style="max-height:60vh;overflow-y:auto"></div>
    </div>`;
    document.body.appendChild(overlay);
    let sevFilter='';
    window.filterSev=function(s){sevFilter=s;renderDefectList()};
    window.renderDefectList=function(){
      const q=(document.getElementById('dfFilter').value||'').toLowerCase();
      let h='',total=0;
      DEFECT_LIBRARY.forEach((cat,ci)=>{
        const matching=cat.issues.filter(i=>{
          if(sevFilter && !i.sev.startsWith(sevFilter))return false;
          if(!q)return true;
          return i.desc.toLowerCase().includes(q)||i.ref.toLowerCase().includes(q)||cat.cat.toLowerCase().includes(q)||(i.trade||'').toLowerCase().includes(q);
        });
        if(!matching.length)return;
        total+=matching.length;
        h+=`<h4 style="margin:14px 0 6px;color:#0D1B2A;border-bottom:2px solid #F05A28;padding-bottom:3px;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:1px">${esc(cat.cat)} <span class="mini muted">(${matching.length})</span></h4>`;
        matching.forEach((it)=>{
          const ii=cat.issues.indexOf(it);
          const sevNum=parseInt(it.sev)||0;
          const sevColor=sevNum>=5?'#dc2626':sevNum>=4?'#ea580c':sevNum>=3?'#d97706':sevNum>=2?'#65a30d':'#6b7280';
          h+=`<div style="padding:10px;background:#fff;margin-bottom:5px;border:1px solid #d2cec8;border-left:5px solid ${sevColor};border-radius:4px;cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center" onmouseover="this.style.background='#f6f8fa'" onmouseout="this.style.background='#fff'" onclick="applyDefect(${ci},${ii})">
            <div>
              <strong style="font-size:13px">${esc(it.desc)}</strong><br>
              <span class="mini" style="color:${sevColor};font-weight:bold">⬤ Severity ${esc(it.sev)}</span>
              <span class="mini muted"> · 📘 ${esc(it.ref)}</span>
              <span class="mini muted"> · 🔧 ${esc(it.trade||'—')}</span>
              <span class="mini muted"> · 💰 ${esc(it.cost||'—')}</span>
            </div>
            <button class="btn primary mini" style="white-space:nowrap">Apply ›</button>
          </div>`;
        });
      });
      const dl=document.getElementById('defectList');
      dl.innerHTML=`<div class="mini muted" style="margin-bottom:8px">Showing ${total} defects${q?` matching "${esc(q)}"`:''}${sevFilter?` at severity ${sevFilter}+`:''}</div>${h||'<p class="muted">No defects match your search.</p>'}`;
    };
    window.applyDefect=function(catIdx,issueIdx){
      const cat=DEFECT_LIBRARY[catIdx];
      const issue=cat.issues[issueIdx];
      const dp=PROJECT._defectPicker;
      PROJECT.inspections[dp.insp]=PROJECT.inspections[dp.insp]||{};
      PROJECT.inspections[dp.insp][dp.key]=PROJECT.inspections[dp.insp][dp.key]||{};
      const item=PROJECT.inspections[dp.insp][dp.key];
      item.status='Defect';
      item.severity=issue.sev;
      const existingNotes=item.notes||'';
      item.notes=(existingNotes?existingNotes+'\n\n':'')+`${issue.desc}\n[Ref: ${issue.ref}]\n[Recommended trade: ${issue.trade}]\n[Indicative cost: ${issue.cost}]`;
      /* Try to parse cost mid-point */
      const costMatch=issue.cost.match(/\$?([0-9,]+)[^0-9]+\$?([0-9,]+)/);
      if(costMatch && !item.cost){
        const lo=parseFloat(costMatch[1].replace(/,/g,''));
        const hi=parseFloat(costMatch[2].replace(/,/g,''));
        item.cost=Math.round((lo+hi)/2);
      }
      item.suggestedTrade=issue.trade;
      document.getElementById('defectPickerOverlay').remove();
      renderPages();goTab(16);
    };
    renderDefectList();
  },10);
};

/* ---------- INSPECTION HISTORY — multiple inspections per property ---------- */
PROJECT.inspectionHistory=PROJECT.inspectionHistory||[];

function saveCurrentInspection(){
  const cur=PROJECT.inspections.currentType||'PrePurchaseBP';
  const insp=INSPECTION_TYPES.find(i=>i.id===cur);
  const checks=PROJECT.inspections[cur]||{};
  const c=PROJECT.client||{};
  /* Calc score */
  let totItems=0,pass=0,fail=0,maint=0,na=0,totCost=0,photos=0;
  Object.values(checks).forEach(v=>{
    if(!v||!v.status)return;
    totItems++;
    const s=v.status;
    if(s==='Pass'||s==='Compliant'||s==='Yes'||s==='C')pass++;
    else if(s==='Fail'||s==='Defect'||s==='No'||s==='CNC')fail++;
    else if(s==='Maintenance'||s==='RFI'||s==='NC')maint++;
    else if(s==='N/A'||s==='NA')na++;
    if(v.cost)totCost+=parseFloat(v.cost)||0;
    if(v.photos)photos+=v.photos.length;
  });
  const score=totItems?Math.round(((pass+na)/totItems)*100):0;
  const entry={
    id:'INS_'+Date.now().toString(36).toUpperCase(),
    type:cur,
    typeName:insp.name,
    date:new Date().toISOString(),
    property:c.address||'',
    client:c.name||'',
    inspector:(PROJECT.settings||{}).contactName||'',
    score,totItems,pass,fail,maint,na,totCost,photos,
    data:JSON.parse(JSON.stringify(checks)),
    gpsLat:PROJECT.inspections._gpsLat||null,
    gpsLng:PROJECT.inspections._gpsLng||null,
    inspectorSig:PROJECT.inspections._inspectorSig||null,
    clientSig:PROJECT.inspections._clientSig||null
  };
  PROJECT.inspectionHistory.push(entry);
  alert(`Inspection saved to history.\nScore: ${score}%\n${pass} compliant · ${fail} defects · ${maint} maintenance · ${na} N/A\nEstimated rectification: $${totCost.toLocaleString()}`);
  renderPages();goTab(16);
}

function loadInspectionFromHistory(id){
  const e=PROJECT.inspectionHistory.find(h=>h.id===id);
  if(!e)return;
  if(!confirm(`Load saved inspection "${e.typeName}" from ${new Date(e.date).toLocaleDateString('en-AU')}? Current unsaved data will be replaced.`))return;
  PROJECT.inspections.currentType=e.type;
  PROJECT.inspections[e.type]=JSON.parse(JSON.stringify(e.data));
  PROJECT.inspections._gpsLat=e.gpsLat;
  PROJECT.inspections._gpsLng=e.gpsLng;
  PROJECT.inspections._inspectorSig=e.inspectorSig;
  PROJECT.inspections._clientSig=e.clientSig;
  renderPages();goTab(16);
}

function deleteInspectionFromHistory(id){
  if(!confirm('Delete this saved inspection?'))return;
  PROJECT.inspectionHistory=PROJECT.inspectionHistory.filter(h=>h.id!==id);
  renderPages();goTab(16);
}

function cloneInspectionForRevisit(id){
  const e=PROJECT.inspectionHistory.find(h=>h.id===id);
  if(!e)return;
  PROJECT.inspections.currentType=e.type;
  /* Carry forward only items where status was Defect / Maintenance / Fail / RFI — these are the rectification items */
  const newData={};
  Object.keys(e.data).forEach(k=>{
    const v=e.data[k];
    if(v.status==='Defect'||v.status==='Fail'||v.status==='No'||v.status==='Maintenance'||v.status==='RFI'){
      newData[k]={
        ...v,
        status:'Pending re-check',
        notes:`[Previous (${new Date(e.date).toLocaleDateString('en-AU')}): ${v.status}${v.severity?', sev '+v.severity:''}${v.cost?', $'+v.cost:''}]\n\n${v.notes||''}`,
        photos:[] /* fresh photos for re-inspection */
      };
    }
  });
  PROJECT.inspections[e.type]=newData;
  alert(`Re-inspection set up. ${Object.keys(newData).length} previous defect/maintenance items carried forward for re-check.`);
  renderPages();goTab(16);
}

/* ---------- GPS LOCATION CAPTURE ---------- */
function captureGPS(){
  if(!navigator.geolocation){alert('Geolocation not supported by this browser');return}
  navigator.geolocation.getCurrentPosition(pos=>{
    PROJECT.inspections._gpsLat=pos.coords.latitude.toFixed(6);
    PROJECT.inspections._gpsLng=pos.coords.longitude.toFixed(6);
    PROJECT.inspections._gpsAccuracy=Math.round(pos.coords.accuracy);
    PROJECT.inspections._gpsTime=new Date().toISOString();
    alert(`GPS captured:\n${PROJECT.inspections._gpsLat}, ${PROJECT.inspections._gpsLng}\nAccuracy: ±${PROJECT.inspections._gpsAccuracy}m`);
    renderPages();goTab(16);
  },err=>alert('GPS error: '+err.message),{enableHighAccuracy:true,timeout:10000});
}

/* ---------- E-SIGNATURE PAD ---------- */
function openSignaturePad(role){
  const existing=document.getElementById('sigOverlay');if(existing)existing.remove();
  const overlay=document.createElement('div');
  overlay.id='sigOverlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML=`<div style="background:#fff;border-radius:8px;max-width:680px;width:100%;padding:20px">
    <h3 style="margin:0 0 10px;color:#0D1B2A;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:1px">✍ ${role==='inspector'?'Inspector':'Client / Owner'} Signature</h3>
    <p class="mini muted">Sign with your finger (touch) or mouse below.</p>
    <canvas id="sigCanvas" width="600" height="200" style="border:2px solid #0D1B2A;background:#fff;display:block;width:100%;touch-action:none;cursor:crosshair"></canvas>
    <div class="row" style="margin-top:10px">
      <button class="btn" onclick="clearSig()">↻ Clear</button>
      <button class="btn primary" onclick="saveSig('${role}')">✓ Save signature</button>
      <button class="btn" onclick="document.getElementById('sigOverlay').remove()">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  const cvs=document.getElementById('sigCanvas');
  const ctx=cvs.getContext('2d');
  ctx.strokeStyle='#0D1B2A';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  let drawing=false,lastX=0,lastY=0;
  const getXY=e=>{
    const r=cvs.getBoundingClientRect();
    const sx=cvs.width/r.width,sy=cvs.height/r.height;
    if(e.touches&&e.touches[0])return [(e.touches[0].clientX-r.left)*sx,(e.touches[0].clientY-r.top)*sy];
    return [(e.clientX-r.left)*sx,(e.clientY-r.top)*sy];
  };
  const start=e=>{e.preventDefault();drawing=true;[lastX,lastY]=getXY(e)};
  const draw=e=>{if(!drawing)return;e.preventDefault();const [x,y]=getXY(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();[lastX,lastY]=[x,y]};
  const stop=()=>drawing=false;
  cvs.addEventListener('mousedown',start);cvs.addEventListener('mousemove',draw);cvs.addEventListener('mouseup',stop);cvs.addEventListener('mouseleave',stop);
  cvs.addEventListener('touchstart',start);cvs.addEventListener('touchmove',draw);cvs.addEventListener('touchend',stop);
  window.clearSig=()=>ctx.clearRect(0,0,cvs.width,cvs.height);

function annotatePhoto(insp,key,idx){
  const photo=PROJECT.inspections[insp][key].photos[idx];
  if(!photo)return;
  const existing=document.getElementById('annOverlay');if(existing)existing.remove();
  const overlay=document.createElement('div');
  overlay.id='annOverlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;flex-direction:column';
  overlay.innerHTML=`<div style="background:#fff;border-radius:8px;max-width:900px;max-height:90vh;padding:14px;display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <strong style="color:#0D1B2A">✏ Annotate photo — click & drag to draw</strong>
      <button onclick="document.getElementById('annOverlay').remove()" style="background:#dc2626;color:#fff;border:none;padding:6px 12px;border-radius:4px;cursor:pointer">✕ Close</button>
    </div>
    <div class="row">
      <button class="btn" onclick="annTool='circle'">⭕ Circle</button>
      <button class="btn" onclick="annTool='rect'">▭ Rectangle</button>
      <button class="btn" onclick="annTool='arrow'">→ Arrow</button>
      <button class="btn" onclick="annTool='free'">✎ Freehand</button>
      <select onchange="annColor=this.value" style="padding:4px">
        <option value="#dc2626">Red</option><option value="#F05A28" selected>Orange</option><option value="#facc15">Yellow</option><option value="#16a34a">Green</option><option value="#2563eb">Blue</option>
      </select>
      <input type="range" min="2" max="12" value="4" oninput="annWidth=parseInt(this.value)" title="Stroke width">
      <button class="btn" onclick="undoAnn()">↶ Undo</button>
      <button class="btn primary" onclick="saveAnn('${insp}','${key}',${idx})">✓ Save</button>
    </div>
    <canvas id="annCanvas" style="max-width:800px;max-height:60vh;border:2px solid #0D1B2A;cursor:crosshair;display:block;touch-action:none"></canvas>
    <input id="annCaption" placeholder="Photo caption (optional)" value="${esc(photo.caption||'')}" style="padding:6px;border:1px solid #d2cec8;border-radius:4px">
  </div>`;
  document.body.appendChild(overlay);
  const cvs=document.getElementById('annCanvas');
  const ctx=cvs.getContext('2d');
  const img=new Image();
  let history=[];
  window.annTool='circle';window.annColor='#F05A28';window.annWidth=4;
  img.onload=()=>{
    cvs.width=img.width;cvs.height=img.height;
    ctx.drawImage(img,0,0);
    history=[cvs.toDataURL()];
  };
  img.src=photo.data;
  let drawing=false,startX=0,startY=0,baseImage=null;
  const getXY=e=>{
    const r=cvs.getBoundingClientRect();
    const sx=cvs.width/r.width,sy=cvs.height/r.height;
    if(e.touches&&e.touches[0])return [(e.touches[0].clientX-r.left)*sx,(e.touches[0].clientY-r.top)*sy];
    return [(e.clientX-r.left)*sx,(e.clientY-r.top)*sy];
  };
  cvs.addEventListener('mousedown',start);cvs.addEventListener('touchstart',start);
  cvs.addEventListener('mousemove',move);cvs.addEventListener('touchmove',move);
  cvs.addEventListener('mouseup',stop);cvs.addEventListener('touchend',stop);
  cvs.addEventListener('mouseleave',stop);
  function start(e){e.preventDefault();drawing=true;[startX,startY]=getXY(e);baseImage=ctx.getImageData(0,0,cvs.width,cvs.height)}
  function move(e){
    if(!drawing)return;e.preventDefault();
    const [x,y]=getXY(e);
    ctx.putImageData(baseImage,0,0);
    ctx.strokeStyle=annColor;ctx.lineWidth=annWidth;ctx.lineCap='round';
    ctx.beginPath();
    if(annTool==='circle'){
      const rx=Math.abs(x-startX)/2,ry=Math.abs(y-startY)/2;
      ctx.ellipse((startX+x)/2,(startY+y)/2,rx,ry,0,0,Math.PI*2);
      ctx.stroke();
    }else if(annTool==='rect'){
      ctx.strokeRect(startX,startY,x-startX,y-startY);
    }else if(annTool==='arrow'){
      ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();
      const ang=Math.atan2(y-startY,x-startX);
      const head=15+annWidth;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-head*Math.cos(ang-Math.PI/6),y-head*Math.sin(ang-Math.PI/6));ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-head*Math.cos(ang+Math.PI/6),y-head*Math.sin(ang+Math.PI/6));ctx.stroke();
    }else if(annTool==='free'){
      ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();
      startX=x;startY=y;baseImage=ctx.getImageData(0,0,cvs.width,cvs.height);
    }
  }
  function stop(){if(drawing){drawing=false;history.push(cvs.toDataURL());if(history.length>20)history.shift()}}
  window.undoAnn=()=>{
    if(history.length>1){history.pop();const i=new Image();i.onload=()=>{ctx.clearRect(0,0,cvs.width,cvs.height);ctx.drawImage(i,0,0)};i.src=history[history.length-1]}
  };
  window.saveAnn=(insp,key,idx)=>{
    const cap=document.getElementById('annCaption').value;
    PROJECT.inspections[insp][key].photos[idx].data=cvs.toDataURL('image/jpeg',0.85);
    PROJECT.inspections[insp][key].photos[idx].caption=cap;
    PROJECT.inspections[insp][key].photos[idx].annotated=true;
    document.getElementById('annOverlay').remove();
    renderPages();goTab(16);
  };
}

function findItemLabel(insp,key){
  /* key formats: stage_X_Y, item_N, rms_N, type_N */
  if(key.startsWith('stage_')){
    const [_,si,ii]=key.split('_');
    return (insp.stages&&insp.stages[+si]&&insp.stages[+si].chk&&insp.stages[+si].chk[+ii])||key;
  }
  if(key.startsWith('item_')){const i=+key.slice(5);return (insp.items&&insp.items[i])||key}
  if(key.startsWith('rms_')){const i=+key.slice(4);return (insp.standards14&&insp.standards14[i])||key}
  if(key.startsWith('type_')){const i=+key.slice(5);return (insp.types&&insp.types[i])||key}
  return key;
}

/* ---------- SECTION SCORING — auto compute % pass per group ---------- */
function calcSectionScores(inspType){
  const insp=INSPECTION_TYPES.find(i=>i.id===inspType);
  const checks=(PROJECT.inspections||{})[inspType]||{};
  const sections=[];
  if(insp.stages){
    insp.stages.forEach((s,si)=>{
      let tot=0,pass=0,fail=0,maint=0,na=0;
      s.chk.forEach((_,ii)=>{
        const v=checks[`stage_${si}_${ii}`];
        if(!v||!v.status)return;
        tot++;
        if(v.status==='Pass'||v.status==='Compliant')pass++;
        else if(v.status==='Fail'||v.status==='Defect')fail++;
        else if(v.status==='Maintenance'||v.status==='RFI')maint++;
        else if(v.status==='N/A'||v.status==='NA')na++;
      });
      sections.push({name:s.n,tot,pass,fail,maint,na,total:s.chk.length,score:tot?Math.round(((pass+na)/tot)*100):null});
    });
  }
  if(insp.items&&insp.items.length){
    let tot=0,pass=0,fail=0,maint=0,na=0;
    insp.items.forEach((_,i)=>{
      const v=checks[`item_${i}`];if(!v||!v.status)return;
      tot++;
      if(v.status==='Pass'||v.status==='Compliant')pass++;
      else if(v.status==='Fail'||v.status==='Defect')fail++;
      else if(v.status==='Maintenance'||v.status==='RFI')maint++;
      else if(v.status==='N/A'||v.status==='NA')na++;
    });
    sections.push({name:'Inspection items',tot,pass,fail,maint,na,total:insp.items.length,score:tot?Math.round(((pass+na)/tot)*100):null});
  }
  if(insp.standards14&&insp.standards14.length){
    let tot=0,pass=0,fail=0,maint=0,na=0;
    insp.standards14.forEach((_,i)=>{
      const v=checks[`rms_${i}`];if(!v||!v.status)return;
      tot++;
      if(v.status==='Pass'||v.status==='Compliant')pass++;
      else if(v.status==='Fail'||v.status==='Defect')fail++;
      else if(v.status==='N/A'||v.status==='NA')na++;
    });
    sections.push({name:'14 Prescribed standards',tot,pass,fail,maint,na,total:insp.standards14.length,score:tot?Math.round(((pass+na)/tot)*100):null});
  }
  return sections;
}

  /* Inspection history */
  const history=PROJECT.inspectionHistory||[];
  const historyCard=`<div style="margin-top:14px">${card('📚 Saved Inspection History','HIST',`
    <p class="mini muted">Each saved inspection is timestamped + scored. Reload to re-open or Clone for a re-inspection (carrying forward unresolved defects).</p>
    ${history.length===0?'<p class="muted">No saved inspections yet. Click 💾 Save inspection above to capture the current snapshot.</p>':`
    <table><thead><tr><th>Date</th><th>Type</th><th>Property</th><th>Score</th><th>Items</th><th>Cost</th><th>Actions</th></tr></thead><tbody>
    ${history.slice().reverse().map(h=>{
      const c=h.score>=90?'#16a34a':h.score>=70?'#65a30d':h.score>=50?'#d97706':'#dc2626';
      return `<tr>
        <td>${new Date(h.date).toLocaleDateString('en-AU')}<br><span class="mini muted">${new Date(h.date).toLocaleTimeString('en-AU')}</span></td>
        <td><strong>${esc(h.typeName)}</strong></td>
        <td>${esc(h.property)}</td>
        <td><span style="background:${c};color:#fff;padding:4px 10px;border-radius:14px;font-weight:bold">${h.score}%</span></td>
        <td><span class="mini">${h.pass}✓ ${h.fail}✗ ${h.maint}⚠ ${h.na}—</span><br><span class="mini muted">${h.photos}📷</span></td>
        <td>${h.totCost?'$'+h.totCost.toLocaleString():'—'}</td>
        <td><button class="btn mini" onclick="loadInspectionFromHistory('${h.id}')">Open</button>
          <button class="btn mini" onclick="cloneInspectionForRevisit('${h.id}')" title="Re-inspect carrying forward defects">↻ Re-inspect</button>
          <button class="btn mini" style="background:#dc2626;color:#fff" onclick="deleteInspectionFromHistory('${h.id}')">✕</button></td>
      </tr>`;
    }).join('')}
    </tbody></table>`}
  `)}</div>`;

  /* Action items dashboard */
  const actionItems=renderActionItemsDashboard();

  /* Signatures display */
  let sigBlock='';
  if(sigInsp||sigClient){
    sigBlock=`<div style="margin-top:14px">${card('✍ Signatures','SIG',`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div style="border:1px solid #d2cec8;border-radius:6px;padding:10px;background:#fff">
          <strong class="mini">Inspector</strong><br>
          ${sigInsp?`<img src="${sigInsp}" style="max-width:100%;height:80px;display:block">`:'<p class="muted mini">Not signed</p>'}
        </div>
        <div style="border:1px solid #d2cec8;border-radius:6px;padding:10px;background:#fff">
          <strong class="mini">Client / Owner</strong><br>
          ${sigClient?`<img src="${sigClient}" style="max-width:100%;height:80px;display:block">`:'<p class="muted mini">Not signed</p>'}
        </div>
      </div>
      <p class="mini muted" style="margin-top:6px">${PROJECT.inspections._sigDate?'Signed: '+new Date(PROJECT.inspections._sigDate).toLocaleString('en-AU'):''}</p>
    `)}</div>`;
  }

  /* Insert score bar + GoAudits bar at start of body within the existing card.
     Easier: prepend score/goAudits + append history/actions/sigs */
  /* The base returns: <div class="card"><div class="ch">...</div><div class="cb">CONTENT</div></div>+extras
     We want to inject goAuditsBar + scoreBar inside .cb, after the first <p class="mini muted">. */
  const injectIdx=baseHTML.indexOf('<div class="cb">');
  if(injectIdx>=0){
    const cbStart=injectIdx+'<div class="cb">'.length;
    /* Find end of first <p>...</p> */
    const pEnd=baseHTML.indexOf('</p>',cbStart);
    const insertAt=pEnd>0?pEnd+4:cbStart;
    const injected=baseHTML.slice(0,insertAt)+goAuditsBar+scoreBar+baseHTML.slice(insertAt);
    return injected+sigBlock+historyCard+actionItems;
  }
  return baseHTML+goAuditsBar+scoreBar+sigBlock+historyCard+actionItems;
};

/* ---------- INDEXEDDB STORAGE LAYER ---------- */
const IDB_NAME = 'HBC_OS_DB';
const IDB_VERSION = 1;
const IDB_STORE = 'projects';
const IDB_KEY = 'main'; /* Single-project app — could be expanded to multi-project */

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE);
      }
      if (!db.objectStoreNames.contains('settings')) {
        db.createObjectStore('settings');
      }
      if (!db.objectStoreNames.contains('history')) {
        db.createObjectStore('history', { keyPath: 'id' });
      }
    };
  });
}

async function idbSave(key, data) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(data, key);
    tx.oncomplete = () => { db.close(); resolve(true); };
    tx.onerror = () => { db.close(); reject(tx.error); };
  });
}

async function idbLoad(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => { db.close(); resolve(req.result); };
    req.onerror = () => { db.close(); reject(req.error); };
  });
}

async function idbDelete(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = () => { db.close(); resolve(true); };
    tx.onerror = () => { db.close(); reject(tx.error); };
  });
}

async function idbList() {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).getAllKeys();
    req.onsuccess = () => { db.close(); resolve(req.result); };
    req.onerror = () => { db.close(); reject(req.error); };
  });
}

/* Patch the original save() / load() functions to use IndexedDB instead of localStorage for the heavy PROJECT data.
   Light settings still go to localStorage for fast access. */
const STORAGE_KEY_PWA = 'HBC_OS_PWA_PROJECT';

window.saveProject = async function(silent) {
  try {
    /* Save full project to IDB (handles photos etc fine) */
    await idbSave(IDB_KEY, JSON.parse(JSON.stringify(PROJECT)));
    /* Save a lightweight pointer in localStorage so we know there's an IDB version */
    try {
      localStorage.setItem(STORAGE_KEY_PWA + '_marker', JSON.stringify({
        savedAt: new Date().toISOString(),
        clientName: (PROJECT.client||{}).name || '',
        address: (PROJECT.client||{}).address || ''
      }));
    } catch(e){}
    if (!silent) {
      showToast('💾 Saved locally (IndexedDB)', 'ok');
    }
    return true;
  } catch (e) {
    console.error('Save error:', e);
    showToast('Save failed: ' + e.message, 'err');
    return false;
  }
};

window.loadProject = async function(silent) {
  try {
    const data = await idbLoad(IDB_KEY);
    if (!data) {
      if (!silent) showToast('No saved project found', 'warn');
      return false;
    }
    /* Merge: keep current PROJECT structure, overwrite with loaded values */
    Object.keys(data).forEach(k => { PROJECT[k] = data[k]; });
    if (!silent) showToast('📂 Loaded from local storage', 'ok');
    renderPages();
    return true;
  } catch (e) {
    console.error('Load error:', e);
    showToast('Load failed: ' + e.message, 'err');
    return false;
  }
};

/* ---------- SERVICE WORKER REGISTRATION ---------- */
let __swReg = null;
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js', { scope: './' })
      .then(reg => {
        __swReg = reg;
        console.log('[SW] Registered, scope:', reg.scope);

        /* Listen for updates */
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner();
            }
          });
        });
      })
      .catch(err => console.warn('[SW] Registration failed:', err));

    /* Reload page when new SW takes control */
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  });
}

/* ---------- GOOGLE DRIVE SYNC ---------- */
const GDRIVE_DISCOVERY = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
const GDRIVE_SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

let gisInited = false;
let gapiInited = false;
let tokenClient = null;
let driveAccessToken = null;

/* Load Google APIs lazily — only when user opts in */
window.initGoogleDrive = function() {
  if (gisInited && gapiInited) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const clientId = (PROJECT.settings||{}).gdriveClientId || localStorage.getItem('hbc_gdrive_client_id');
    if (!clientId) {
      reject(new Error('Google Drive Client ID not configured. See Settings.'));
      return;
    }

    let scriptsLoaded = 0;
    const checkReady = () => {
      if (scriptsLoaded === 2 && window.gapi && window.google) {
        gapi.load('client', async () => {
          try {
            await gapi.client.init({ discoveryDocs: [GDRIVE_DISCOVERY] });
            gapiInited = true;
            tokenClient = google.accounts.oauth2.initTokenClient({
              client_id: clientId,
              scope: GDRIVE_SCOPES,
              callback: (resp) => {
                if (resp.error) { console.error(resp); showToast('Sign-in error: ' + resp.error, 'err'); return; }
                driveAccessToken = resp.access_token;
                gapi.client.setToken({ access_token: resp.access_token });
                localStorage.setItem('hbc_gdrive_token_ts', Date.now().toString());
                updateSyncIndicator('Google Drive connected');
                showToast('☁ Google Drive connected', 'ok');
                /* Refresh Settings page so green ✅ Connected status appears */
                if (typeof renderPages === 'function') renderPages();
              }
            });
            gisInited = true;
            resolve();
          } catch (e) { reject(e); }
        });
      }
    };

    if (!document.getElementById('gapi-script')) {
      const s = document.createElement('script');
      s.id = 'gapi-script';
      s.src = 'https://apis.google.com/js/api.js';
      s.async = true; s.defer = true;
      s.onload = () => { scriptsLoaded++; checkReady(); };
      s.onerror = reject;
      document.head.appendChild(s);
    } else { scriptsLoaded++; checkReady(); }

    if (!document.getElementById('gis-script')) {
      const s2 = document.createElement('script');
      s2.id = 'gis-script';
      s2.src = 'https://accounts.google.com/gsi/client';
      s2.async = true; s2.defer = true;
      s2.onload = () => { scriptsLoaded++; checkReady(); };
      s2.onerror = reject;
      document.head.appendChild(s2);
    } else { scriptsLoaded++; checkReady(); }
  });
};

window.driveSignIn = async function() {
  try {
    await initGoogleDrive();
    if (!tokenClient) { showToast('Google Drive setup failed', 'err'); return; }
    tokenClient.requestAccessToken({ prompt: driveAccessToken ? '' : 'consent' });

window.driveSaveProject = async function() {
  if (!driveAccessToken) { await driveSignIn(); if (!driveAccessToken) return; }
  try {
    updateSyncIndicator('Syncing...', 'syncing');
    const filename = `HBC_OS_${(PROJECT.client||{}).name?.replace(/\W/g,'_')||'project'}_${new Date().toISOString().slice(0,10)}.json`;
    const data = JSON.stringify({
      version: 'V20-PWA',
      savedAt: new Date().toISOString(),
      project: PROJECT
    }, null, 2);

    /* Look for existing file (single backup pattern) */
    const search = await gapi.client.drive.files.list({
      spaces: 'appDataFolder',
      q: `name='${filename}'`,
      fields: 'files(id,name)'
    });

    const metadata = { name: filename, parents: ['appDataFolder'] };
    const boundary = '-------314159265358979323846';
    const delimiter = `\r\n--${boundary}\r\n`;
    const closeDelim = `\r\n--${boundary}--`;
    const multipartBody =
      delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(metadata) +
      delimiter + 'Content-Type: application/json\r\n\r\n' + data + closeDelim;

    let url, method;
    if (search.result.files && search.result.files.length) {
      url = `https://www.googleapis.com/upload/drive/v3/files/${search.result.files[0].id}?uploadType=multipart`;
      method = 'PATCH';
    } else {
      url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
      method = 'POST';
    }

    const resp = await fetch(url, {
      method,
      headers: {
        'Authorization': `Bearer ${driveAccessToken}`,
        'Content-Type': `multipart/related; boundary=${boundary}`
      },
      body: multipartBody
    });

    if (!resp.ok) throw new Error('Drive save failed: ' + resp.status);
    const result = await resp.json();
    localStorage.setItem('hbc_last_drive_sync', new Date().toISOString());
    updateSyncIndicator('Synced to Drive');
    showToast(`☁ Backed up to Google Drive (${filename})`, 'ok');
    return result;
  } catch (e) {
    console.error(e);
    showToast('Drive save error: ' + e.message, 'err');
    updateSyncIndicator('Sync failed', 'offline');
  }
};

/* ============================================================
   V20-PWA — LIBRARY & TEMPLATE EDITORS
   • Custom defects: add to existing or new categories
   • Custom inspection templates: create new or clone existing
   • Edit / delete custom entries (built-ins are read-only)
   • Export / import as JSON for sharing between users
   • Persists via IndexedDB + Google Drive sync (auto)
   ============================================================ */

/* PROJECT extension */
PROJECT.customDefects = PROJECT.customDefects || [];          /* [{cat,desc,ref,sev,trade,cost}] */
PROJECT.customInspectionTypes = PROJECT.customInspectionTypes || []; /* [{id,cat,name,when,standard,scope,deliverable,items,typicalFee}] */

/* ---------- REBUILD LIBRARIES — merge built-ins + customisations ---------- */
function rebuildLibraries() {
  /* Remove previously-injected custom entries from DEFECT_LIBRARY */
  DEFECT_LIBRARY.forEach(cat => {
    cat.issues = cat.issues.filter(i => !i._custom);
  });
  /* Drop any empty custom-only categories */
  for (let i = DEFECT_LIBRARY.length - 1; i >= 0; i--) {
    if (DEFECT_LIBRARY[i]._customCat && DEFECT_LIBRARY[i].issues.length === 0) {
      DEFECT_LIBRARY.splice(i, 1);
    }
  }
  /* Add fresh custom defects, grouped by category */
  (PROJECT.customDefects || []).forEach((d, idx) => {
    let cat = DEFECT_LIBRARY.find(c => c.cat === d.cat);
    if (!cat) {
      cat = { cat: d.cat, issues: [], _customCat: true };
      DEFECT_LIBRARY.push(cat);
    }
    cat.issues.push({
      desc: d.desc, ref: d.ref, sev: d.sev, trade: d.trade, cost: d.cost,
      _custom: true, _idx: idx
    });
  });

  /* Inspection types — remove and re-add custom */
  for (let i = INSPECTION_TYPES.length - 1; i >= 0; i--) {
    if (INSPECTION_TYPES[i]._custom) INSPECTION_TYPES.splice(i, 1);
  }
  (PROJECT.customInspectionTypes || []).forEach(insp => {
    INSPECTION_TYPES.push({ ...insp, _custom: true });
  });
}

/* Run rebuild on startup + after every loadProject */
rebuildLibraries();

  renderPages();
  return r;
};

      if (src === 'custom' && !it._custom) return false;
      if (src === 'builtin' && it._custom) return false;
      if (!filter) return true;
      return it.desc.toLowerCase().includes(filter)
          || (it.ref || '').toLowerCase().includes(filter)
          || cat.cat.toLowerCase().includes(filter)
          || (it.trade || '').toLowerCase().includes(filter);

window.cloneToCustom = function(catName, descSnippet) {
  const cat = DEFECT_LIBRARY.find(c => c.cat === catName);
  if (!cat) return;
  const issue = cat.issues.find(i => i.desc === descSnippet);
  if (!issue) return;
  PROJECT.customDefects.push({
    cat: catName,
    desc: '[COPY] ' + issue.desc,
    ref: issue.ref,
    sev: issue.sev,
    trade: issue.trade,
    cost: issue.cost
  });
  rebuildLibraries();
  saveProject(true);
  openDefectEditor(PROJECT.customDefects.length - 1);

window.importCustomDefects = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.type !== 'HBC_Custom_Defects' || !Array.isArray(data.defects)) {
        alert('Not a valid HBC defects export file');
        return;
      }
      const mode = confirm(`Import ${data.defects.length} defects?\n\nOK = MERGE (add to existing custom defects)\nCancel = REPLACE all custom defects`);
      if (mode) {
        PROJECT.customDefects = PROJECT.customDefects.concat(data.defects);
      } else {
        if (!confirm(`Replace ${PROJECT.customDefects.length} existing custom defects with ${data.defects.length} imported ones?`)) return;
        PROJECT.customDefects = data.defects;
      }
      rebuildLibraries();
      await saveProject(true);
      renderDefectMgrList();
      showToast(`✓ Imported ${data.defects.length} defects`, 'ok');
    } catch (e) { showToast('Import error: ' + e.message, 'err'); }
  };
  reader.readAsText(file);
  event.target.value = '';
};

window.saveTemplateFromEditor = async function(id, isEdit) {
  const name = document.getElementById('tmplName').value.trim();
  if (!name) { alert('Template name is required'); return; }

  const itemsRaw = document.getElementById('tmplItems').value;
  const items = itemsRaw.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  const entry = {
    id,
    cat: document.getElementById('tmplCat').value.trim() || 'Custom',
    name,
    when: document.getElementById('tmplWhen').value.trim(),
    standard: document.getElementById('tmplStandard').value.trim(),
    scope: document.getElementById('tmplScope').value.trim(),
    deliverable: document.getElementById('tmplDeliverable').value.trim(),
    typicalFee: document.getElementById('tmplFee').value.trim(),
    items
  };

  if (isEdit) {
    const idx = PROJECT.customInspectionTypes.findIndex(x => x.id === id);
    if (idx >= 0) PROJECT.customInspectionTypes[idx] = entry;
  } else {
    PROJECT.customInspectionTypes.push(entry);
  }
  rebuildLibraries();
  await saveProject(true);
  document.getElementById('tmplEditOverlay').remove();
  renderTemplateMgrList();
  renderPages();
  showToast(`✓ Template ${isEdit ? 'updated' : 'created'} with ${items.length} items`, 'ok');
};

window.editCustomTemplate = function(id) { openTemplateEditor(id); };

window.deleteCustomTemplate = async function(id) {
  const t = PROJECT.customInspectionTypes.find(x => x.id === id);
  if (!t) return;
  if (!confirm(`Delete custom template "${t.name}"?\n\nThis will also remove any inspection data saved under this template.`)) return;
  PROJECT.customInspectionTypes = PROJECT.customInspectionTypes.filter(x => x.id !== id);
  /* Also clean up inspection data */
  if (PROJECT.inspections && PROJECT.inspections[id]) delete PROJECT.inspections[id];
  if (PROJECT.inspections && PROJECT.inspections.currentType === id) PROJECT.inspections.currentType = 'PrePurchaseBP';
  rebuildLibraries();
  await saveProject(true);
  renderTemplateMgrList();
  renderPages();
  showToast('Template deleted', 'ok');
};

window.cloneTemplateToCustom = function(id) {
  const src = INSPECTION_TYPES.find(i => i.id === id);
  if (!src) return;
  /* Flatten items from stages/standards14/etc into a single items array for editing simplicity */
  let items = [...(src.items || [])];
  if (src.stages) src.stages.forEach(s => s.chk.forEach(c => items.push(`[${s.n}] ${c}`)));
  if (src.standards14) items = items.concat(src.standards14);
  if (src.types) items = items.concat(src.types);

  const newTmpl = {
    id: 'CUSTOM_' + Date.now().toString(36).toUpperCase(),
    cat: src.cat || 'Custom',
    name: '[COPY] ' + src.name,
    when: src.when || '',
    standard: src.standard || '',
    scope: src.scope || '',
    deliverable: src.deliverable || '',
    typicalFee: src.typicalFee || '',
    items
  };
  PROJECT.customInspectionTypes.push(newTmpl);
  rebuildLibraries();
  saveProject(true);
  openTemplateEditor(newTmpl.id);
};

window.importCustomTemplates = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.type !== 'HBC_Custom_Templates' || !Array.isArray(data.templates)) {
        alert('Not a valid HBC templates export file');
        return;
      }
      const mode = confirm(`Import ${data.templates.length} templates?\n\nOK = MERGE (keep existing)\nCancel = REPLACE all custom templates`);
      /* Re-issue IDs to avoid collisions */
      const imported = data.templates.map(t => ({ ...t, id: 'CUSTOM_' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,6).toUpperCase() }));
      if (mode) {
        PROJECT.customInspectionTypes = PROJECT.customInspectionTypes.concat(imported);
      } else {
        if (!confirm(`Replace ${PROJECT.customInspectionTypes.length} existing custom templates with ${imported.length} imported?`)) return;
        PROJECT.customInspectionTypes = imported;
      }
      rebuildLibraries();
      await saveProject(true);
      renderTemplateMgrList();
      renderPages();
      showToast(`✓ Imported ${imported.length} templates`, 'ok');
    } catch (e) { showToast('Import error: ' + e.message, 'err'); }
  };
  reader.readAsText(file);
  event.target.value = '';
};

    if (!header || header.parentElement.querySelector('.add-def-btn')) return;
    const addBtn = document.createElement('button');
    addBtn.className = 'btn primary add-def-btn';
    addBtn.style.cssText = 'padding:6px 12px;font-size:12px;margin-left:10px';
    addBtn.innerHTML = '➕ Add to library';
    addBtn.onclick = () => {
      overlay.remove();
      openDefectEditor();
    };
    header.parentElement.appendChild(addBtn);
  }, 50);
};

/* Re-render once libraries are rebuilt */
setTimeout(() => { rebuildLibraries(); renderPages(); }, 100);


</script>
</body>
</html>
